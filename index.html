<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PokéMesh</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;overflow:hidden;height:100vh;width:100vw;}
 
  /* SCREENS */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;}
  .screen.hidden{display:none;}
 
  /* STARTER SCREEN */
  #starter-screen{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:20px;}
  #starter-screen h1{font-size:28px;font-weight:800;color:#FFD700;text-shadow:0 0 20px #FFD70088;margin-bottom:6px;text-align:center;}
  #starter-screen p{font-size:13px;color:#aaa;margin-bottom:24px;text-align:center;}
  .starter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:360px;}
  .starter-card{background:#ffffff11;border:2px solid #ffffff22;border-radius:16px;padding:14px 8px;text-align:center;cursor:pointer;transition:all .2s;}
  .starter-card:hover,.starter-card:active{border-color:#FFD700;background:#FFD70022;transform:scale(1.04);}
  .starter-card img{width:72px;height:72px;image-rendering:pixelated;}
  .starter-card .name{font-size:12px;font-weight:600;margin-top:6px;color:#fff;}
  .starter-card .type{font-size:10px;color:#aaa;margin-top:2px;}
  .shiny-badge{display:inline-block;background:#FFD700;color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;margin-top:3px;}
 
  /* MAP */
  #map{position:absolute;inset:0;z-index:0;}
  #map-ui{position:absolute;inset:0;z-index:10;pointer-events:none;}
 
  /* TOP BAR */
  #topbar{position:absolute;top:0;left:0;right:0;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(#000a,transparent);pointer-events:auto;z-index:20;}
  #topbar .logo{font-size:18px;font-weight:800;color:#FFD700;text-shadow:0 0 10px #FFD70088;}
  #ble-btn{background:#1D9E75;border:none;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;}
  #ble-btn.connected{background:#0F6E56;}
 
  /* PARTY BAR */
  #party-bar{position:absolute;bottom:80px;left:0;right:0;display:flex;gap:8px;padding:0 14px;pointer-events:auto;z-index:20;overflow-x:auto;}
  .party-slot{background:#000a;border:2px solid #ffffff33;border-radius:12px;padding:6px;text-align:center;min-width:56px;cursor:pointer;flex-shrink:0;}
  .party-slot.active{border-color:#FFD700;}
  .party-slot img{width:40px;height:40px;image-rendering:pixelated;}
  .party-slot .hp-bar{height:3px;background:#333;border-radius:2px;margin-top:3px;}
  .party-slot .hp-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width .3s;}
 
  /* BOTTOM BAR */
  #bottombar{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;display:flex;gap:8px;background:linear-gradient(transparent,#000c);pointer-events:auto;z-index:20;}
  #bottombar button{flex:1;padding:10px;border-radius:12px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
  #btn-scan{background:#1a3a8f;color:#fff;}
  #btn-drain{background:#2a2d3a;color:#aaa;}
 
  /* ENCOUNTER OVERLAY */
  #encounter{position:absolute;inset:0;z-index:50;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;}
  #encounter.hidden{display:none;}
  #enc-title{font-size:13px;color:#aaa;margin-bottom:4px;}
  #enc-name{font-size:24px;font-weight:800;color:#FFD700;margin-bottom:2px;}
  #enc-meta{font-size:12px;color:#888;margin-bottom:16px;}
 
  /* BATTLE SCENE */
  #battle-scene{width:100%;max-width:380px;height:200px;background:linear-gradient(#87CEEB,#87CEEB 60%,#90EE90 60%);border-radius:16px;position:relative;overflow:hidden;margin-bottom:16px;}
  #wild-platform{position:absolute;top:20px;right:20px;text-align:center;}
  #wild-sprite{width:96px;height:96px;image-rendering:pixelated;filter:drop-shadow(0 4px 8px #0008);}
  #wild-sprite.shiny{filter:drop-shadow(0 0 12px #FFD700) drop-shadow(0 4px 8px #0008);}
  #player-platform{position:absolute;bottom:10px;left:20px;text-align:center;}
  #player-battle-sprite{width:80px;height:80px;image-rendering:pixelated;filter:drop-shadow(0 4px 8px #0008);transform:scaleX(-1);}
 
  /* HEALTH BARS */
  .battle-hud{width:100%;max-width:380px;margin-bottom:12px;}
  .hud-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
  .hud-bar{height:8px;background:#333;border-radius:4px;overflow:hidden;}
  .hud-fill{height:100%;border-radius:4px;transition:width .4s;}
  .hud-fill.green{background:#1D9E75;}
  .hud-fill.yellow{background:#EF9F27;}
  .hud-fill.red{background:#e24b4a;}
 
  /* BATTLE LOG */
  #battle-log{width:100%;max-width:380px;background:#0008;border-radius:10px;padding:10px 12px;font-size:13px;color:#ddd;min-height:44px;margin-bottom:12px;border:1px solid #ffffff11;}
 
  /* BATTLE BUTTONS */
  #battle-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%;max-width:380px;}
  #battle-btns button{padding:12px;border-radius:12px;border:none;font-size:14px;font-weight:600;cursor:pointer;}
  #btn-attack{background:#e24b4a;color:#fff;}
  #btn-catch{background:#FFD700;color:#000;}
  #btn-run{background:#2a2d3a;color:#aaa;}
  #btn-swap{background:#1a3a8f;color:#fff;}
 
  /* ATTACK ANIM */
  @keyframes attackSlide{0%{transform:scaleX(-1) translateX(0);}50%{transform:scaleX(-1) translateX(60px);}100%{transform:scaleX(-1) translateX(0);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}};
  @keyframes flash{0%,100%{opacity:1;}50%{opacity:0.2;}}
  @keyframes catchAnim{0%{transform:scale(1);}30%{transform:scale(0.1);}60%{transform:scale(0.1);}100%{transform:scale(0)}}
  @keyframes ballWobble{0%,100%{transform:rotate(0deg);}25%{transform:rotate(15deg);}75%{transform:rotate(-15deg);}}
 
  .anim-attack{animation:attackSlide .4s ease;}
  .anim-shake{animation:shake .3s ease;}
  .anim-flash{animation:flash .4s ease 3;}
 
  /* CAUGHT POPUP */
  #caught-popup{position:absolute;inset:0;z-index:60;background:#000c;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  #caught-popup.hidden{display:none;}
  #caught-popup h2{font-size:26px;font-weight:800;color:#FFD700;margin-bottom:8px;}
  #caught-popup img{width:120px;height:120px;image-rendering:pixelated;margin-bottom:12px;}
  #caught-popup p{font-size:14px;color:#aaa;margin-bottom:20px;}
  #caught-popup button{background:#1D9E75;color:#fff;border:none;padding:12px 32px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}
 
  /* NODE TOAST */
  #node-toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:#1D9E7599;border:1px solid #1D9E75;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #node-toast.show{opacity:1;}
 
  .leaflet-container{background:#1a1a2e;}
</style>
</head>
<body>
 
<!-- STARTER SELECTION -->
<div id="starter-screen" class="screen">
  <h1>⚡ PokéMesh</h1>
  <p>Choose your starter Pokémon to begin your journey</p>
  <div class="starter-grid" id="starter-grid"></div>
</div>
 
<!-- MAIN MAP -->
<div id="game-screen" class="screen hidden" style="z-index:1;position:absolute;inset:0;">
  <div id="map"></div>
  <div id="map-ui">
    <div id="topbar">
      <span class="logo">⚡ PokéMesh</span>
      <button id="ble-btn">Connect BLE</button>
    </div>
    <div id="node-toast">📡 New node detected!</div>
    <div id="party-bar"></div>
    <div id="bottombar">
      <button id="btn-scan">📡 Request Nodes</button>
      <button id="btn-drain">⬇ Drain Buffer</button>
    </div>
  </div>
</div>
 
<!-- ENCOUNTER -->
<div id="encounter" class="hidden">
  <div id="enc-title">A wild Pokémon appeared!</div>
  <div id="enc-name"></div>
  <div id="enc-meta"></div>
 
  <div class="battle-hud">
    <div class="hud-row"><span id="wild-label">Wild</span><span id="wild-hp-text">HP</span></div>
    <div class="hud-bar"><div class="hud-fill green" id="wild-hp-fill" style="width:100%"></div></div>
  </div>
 
  <div id="battle-scene">
    <div id="wild-platform"><img id="wild-sprite" src="" alt="wild"/></div>
    <div id="player-platform"><img id="player-battle-sprite" src="" alt="player"/></div>
  </div>
 
  <div class="battle-hud">
    <div class="hud-row"><span id="player-label">Your Pokémon</span><span id="player-hp-text">HP</span></div>
    <div class="hud-bar"><div class="hud-fill green" id="player-hp-fill" style="width:100%"></div></div>
  </div>
 
  <div id="battle-log">A wild Pokémon appeared! What will you do?</div>
 
  <div id="battle-btns">
    <button id="btn-attack">⚔️ Attack</button>
    <button id="btn-catch">🟡 Throw Ball</button>
    <button id="btn-run">🏃 Run</button>
    <button id="btn-swap">🔄 Swap</button>
  </div>
</div>
 
<!-- CAUGHT POPUP -->
<div id="caught-popup" class="hidden">
  <h2>Gotcha! 🎉</h2>
  <img id="caught-img" src="" alt="caught"/>
  <p id="caught-msg"></p>
  <button id="caught-ok">Continue</button>
</div>
 
<script>
// ─── CONFIG ───────────────────────────────────────────────
const BATTLE_COOLDOWN_MS = 150000; // 2.5 min
const LANDMARK_RADIUS_M  = 150;
const CATCH_BASE_RATE    = 0.65;   // much better catch rate
const SHINY_CHANCE       = 0.20;
 
const LANDMARKS = [
  { name:'Space Needle', lat:47.6205, lng:-122.3493, special:'haunter' },
  { name:'Local 418',    lat:47.6062, lng:-122.3321, special:'machamp' },
];
 
const STARTERS = [
  { id:1,  name:'Bulbasaur',  type:'Grass/Poison' },
  { id:4,  name:'Charmander', type:'Fire' },
  { id:7,  name:'Squirtle',   type:'Water' },
  { id:25, name:'Pikachu',    type:'Electric' },
  { id:133,name:'Eevee',      type:'Normal' },
  { id:122,name:'Mr. Mime',   type:'Psychic/Fairy' },
];
 
// Common pool for random encounters
const COMMON_POOL  = [16,17,19,20,21,23,27,29,32,41,43,46,48,52,54,56,58,60,63,66,69,72,74,77,79,81,84,86,88,90,92,96,98,100,102,104,106,107,108,109,111,113,114,116,118,120,122,123,124,125,126,127,128,129,130,131,132,133,134,135,136,137,138,140,142,143,147];
const UNCOMMON_POOL= [haunter=93,kadabra=64,machoke=67,graveler=75,slowbro=80,magneton=82,dodrio=85,dewgong=87,muk=89,cloyster=91,gengar=94,onix=95,hypno=97,kingler=99,electrode=101,exeggutor=103,marowak=105,hitmonchan=107,hitmonlee=106,lickitung=108,koffing=109,rhydon=112,chansey=113,tangela=114,kangaskhan=115,seadra=117,goldeen=118,staryu=120,tauros=128,gyarados=130,lapras=131,ditto=132,vaporeon=134,jolteon=135,flareon=136,omastar=139,kabutops=141,aerodactyl=142,snorlax=143,dragonair=148];
 
// ─── STATE ────────────────────────────────────────────────
let playerParty = [];
let activeSlot  = 0;
let caughtList  = [];
let knownNodes  = {};
let playerPos   = null;
let map, playerMarker;
let lastBattleTime = 0;
let inBattle    = false;
let wildMon     = null;
let wildHP      = 0, wildMaxHP = 0;
let playerHP    = 0, playerMaxHP = 0;
let bleConnected= false;
let device, server, fromRadioChar, fromNumChar, toRadioChar;
const sleep = ms => new Promise(r=>setTimeout(r,ms));
 
// ─── SPRITE URLS ─────────────────────────────────────────
const spriteUrl      = id => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
const shinySpriteUrl = id => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/shiny/${id}.png`;
const backSpriteUrl  = id => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${id}.png`;
// Gen 5 animated trainer sprite (high quality)
const TRAINER_SPRITE = 'https://archives.bulbagarden.net/media/upload/8/8a/Spr_B2W2_Hilbert.png';
 
// ─── STARTER SCREEN ───────────────────────────────────────
const grid = document.getElementById('starter-grid');
STARTERS.forEach(s => {
  const isShiny = Math.random() < SHINY_CHANCE;
  const url = isShiny ? shinySpriteUrl(s.id) : spriteUrl(s.id);
  const card = document.createElement('div');
  card.className = 'starter-card';
  card.innerHTML = `
    <img src="${url}" alt="${s.name}"/>
    <div class="name">${s.name}</div>
    <div class="type">${s.type}</div>
    ${isShiny ? '<span class="shiny-badge">✨ SHINY</span>' : ''}
  `;
  card.onclick = () => pickStarter(s, isShiny);
  grid.appendChild(card);
});
 
function pickStarter(s, isShiny) {
  const mon = makeMon(s.id, s.name, isShiny, true);
  playerParty = [mon];
  document.getElementById('starter-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  initMap();
  initGPS();
  renderParty();
}
 
// ─── MON FACTORY ─────────────────────────────────────────
function makeMon(id, name, isShiny, isStarter) {
  const level = isStarter ? 5 : Math.floor(Math.random()*15)+3;
  const maxHP  = 20 + level*3;
  return { id, name, isShiny, level, hp:maxHP, maxHP, sprite: isShiny ? shinySpriteUrl(id) : spriteUrl(id), back: backSpriteUrl(id) };
}
 
function randomMon(forceId) {
  const isShiny = Math.random() < 0.05;
  const pool = forceId ? [{id:forceId}] : (Math.random()<0.25 ? UNCOMMON_POOL : COMMON_POOL);
  const id   = forceId || pool[Math.floor(Math.random()*pool.length)];
  return fetch(`https://pokeapi.co/api/v2/pokemon/${id}`)
    .then(r=>r.json())
    .then(data => {
      const name = data.name.charAt(0).toUpperCase()+data.name.slice(1);
      return makeMon(id, name, isShiny, false);
    })
    .catch(()=> makeMon(id,'Pokémon',isShiny,false));
}
 
// ─── MAP ─────────────────────────────────────────────────
function initMap() {
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([47.6062,-122.3321],15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
 
  // Landmark markers
  LANDMARKS.forEach(lm => {
    L.marker([lm.lat,lm.lng],{
      icon:L.divIcon({className:'',html:`<div style="background:#FFD700;color:#000;font-size:11px;font-weight:700;padding:4px 8px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 8px #0008">⭐ ${lm.name}</div>`,iconAnchor:[40,12]})
    }).addTo(map);
  });
}
 
function initGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    const {latitude:lat, longitude:lng} = pos.coords;
    playerPos = {lat,lng};
    if (!playerMarker) {
      playerMarker = L.marker([lat,lng],{
        icon: L.divIcon({className:'',html:`<img src="${playerParty[activeSlot]?.sprite||''}" style="width:36px;height:36px;image-rendering:pixelated;transform:scaleX(-1);filter:drop-shadow(0 2px 6px #0008)"/>`,iconAnchor:[18,36]})
      }).addTo(map);
      map.setView([lat,lng],16);
    } else {
      playerMarker.setLatLng([lat,lng]);
      updateMarkerSprite();
    }
    checkLandmarks(lat,lng);
    maybeSpawnEncounter();
  },{enableHighAccuracy:true,maximumAge:5000});
}
 
function updateMarkerSprite() {
  if (!playerMarker || !playerParty[activeSlot]) return;
  playerMarker.setIcon(L.divIcon({className:'',html:`<img src="${playerParty[activeSlot].sprite}" style="width:36px;height:36px;image-rendering:pixelated;transform:scaleX(-1);filter:drop-shadow(0 2px 6px #0008)"/>`,iconAnchor:[18,36]}));
}
 
// ─── DISTANCE ────────────────────────────────────────────
function distM(lat1,lng1,lat2,lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
 
function checkLandmarks(lat,lng) {
  LANDMARKS.forEach(lm => {
    const d = distM(lat,lng,lm.lat,lm.lng);
    if (d < LANDMARK_RADIUS_M && !lm._triggered) {
      lm._triggered = true;
      setTimeout(()=>lm._triggered=false, BATTLE_COOLDOWN_MS*2);
      showToast(`📍 Near ${lm.name}! Special encounter!`);
      setTimeout(()=>startEncounter(lm.special),2000);
    }
  });
}
 
// ─── SPAWN LOGIC ─────────────────────────────────────────
function maybeSpawnEncounter(forceId) {
  if (inBattle) return;
  const now = Date.now();
  if (!forceId && now - lastBattleTime < BATTLE_COOLDOWN_MS) return;
  lastBattleTime = now;
  startEncounter(forceId||null);
}
 
async function startEncounter(forceId) {
  if (inBattle) return;
  inBattle = true;
  wildMon = await randomMon(forceId);
  wildMaxHP = wildHP = wildMon.maxHP;
 
  const active = playerParty[activeSlot];
  playerMaxHP = active.maxHP;
  playerHP    = active.hp; // persists between battles unless healed at landmark
 
  document.getElementById('enc-name').textContent = (wildMon.isShiny?'✨ ':'')+wildMon.name;
  document.getElementById('enc-meta').textContent = `Lv.${wildMon.level} · ${wildMon.isShiny?'Shiny · ':''}Node Signal encounter`;
  document.getElementById('wild-sprite').src = wildMon.sprite;
  document.getElementById('wild-sprite').className = wildMon.isShiny ? 'shiny' : '';
  document.getElementById('player-battle-sprite').src = active.back;
  document.getElementById('wild-label').textContent  = wildMon.name;
  document.getElementById('player-label').textContent = active.name;
  updateHPBars();
  setBattleLog(`A wild ${wildMon.name} appeared!${wildMon.isShiny?' It\'s shiny!':''} What will you do?`);
  document.getElementById('encounter').classList.remove('hidden');
}
 
// ─── BATTLE ──────────────────────────────────────────────
function updateHPBars() {
  const wp = Math.max(0,(wildHP/wildMaxHP)*100);
  const pp = Math.max(0,(playerHP/playerMaxHP)*100);
  const wf = document.getElementById('wild-hp-fill');
  const pf = document.getElementById('player-hp-fill');
  wf.style.width = wp+'%';
  pf.style.width = pp+'%';
  wf.className = 'hud-fill '+(wp>50?'green':wp>25?'yellow':'red');
  pf.className = 'hud-fill '+(pp>50?'green':pp>25?'yellow':'red');
  document.getElementById('wild-hp-text').textContent  = `${Math.max(0,wildHP)}/${wildMaxHP}`;
  document.getElementById('player-hp-text').textContent= `${Math.max(0,playerHP)}/${playerMaxHP}`;
}
 
function setBattleLog(msg) { document.getElementById('battle-log').textContent = msg; }
 
function disableBtns(d) {
  ['btn-attack','btn-catch','btn-run','btn-swap'].forEach(id=>document.getElementById(id).disabled=d);
}
 
async function doAttack() {
  disableBtns(true);
  const active = playerParty[activeSlot];
  const dmg = Math.floor(Math.random()*8)+3+Math.floor(active.level/2);
  // player attack anim
  const ps = document.getElementById('player-battle-sprite');
  ps.classList.add('anim-attack');
  await sleep(400);
  ps.classList.remove('anim-attack');
  // wild shake
  const ws = document.getElementById('wild-sprite');
  ws.classList.add('anim-shake');
  wildHP = Math.max(0, wildHP-dmg);
  updateHPBars();
  setBattleLog(`${active.name} attacked! Dealt ${dmg} damage.`);
  await sleep(300);
  ws.classList.remove('anim-shake');
 
  if (wildHP <= 0) { await endBattle('faint'); return; }
 
  // Wild counter
  await sleep(400);
  const wdmg = Math.floor(Math.random()*6)+2;
  ws.classList.add('anim-attack');
  await sleep(300);
  ws.classList.remove('anim-attack');
  ps.classList.add('anim-shake');
  playerHP = Math.max(0, playerHP-wdmg);
  active.hp = playerHP;
  updateHPBars();
  setBattleLog(`Wild ${wildMon.name} struck back for ${wdmg} damage!`);
  await sleep(300);
  ps.classList.remove('anim-shake');
 
  if (playerHP <= 0) { await endBattle('fainted'); return; }
  disableBtns(false);
}
 
async function doThrowBall() {
  disableBtns(true);
  setBattleLog('You threw a Poké Ball!');
  // ball wobble on wild sprite
  const ws = document.getElementById('wild-sprite');
  ws.classList.add('anim-flash');
  await sleep(1200);
  ws.classList.remove('anim-flash');
 
  const hpBonus  = 1 - (wildHP/wildMaxHP)*0.3;
  const catchRate = Math.min(0.95, CATCH_BASE_RATE * hpBonus);
  const caught    = Math.random() < catchRate;
 
  if (caught) {
    ws.style.animation = 'catchAnim .6s ease forwards';
    await sleep(700);
    await endBattle('caught');
  } else {
    setBattleLog(`Oh no! ${wildMon.name} broke free!`);
    await sleep(800);
    // Wild attacks after breakout
    const wdmg = Math.floor(Math.random()*5)+2;
    const active = playerParty[activeSlot];
    playerHP = Math.max(0, playerHP-wdmg);
    active.hp = playerHP;
    updateHPBars();
    setBattleLog(`Wild ${wildMon.name} is angry and attacked for ${wdmg}!`);
    await sleep(500);
    if (playerHP <= 0) { await endBattle('fainted'); return; }
    disableBtns(false);
  }
}
 
async function doRun() {
  setBattleLog('Got away safely!');
  await sleep(800);
  closeBattle();
}
 
async function endBattle(result) {
  if (result === 'caught') {
    caughtList.push(wildMon);
    if (playerParty.length < 6) playerParty.push({...wildMon, hp:wildMon.maxHP});
    document.getElementById('encounter').classList.add('hidden');
    document.getElementById('caught-img').src = wildMon.sprite;
    document.getElementById('caught-msg').textContent = `${wildMon.name} was added to your party!${wildMon.isShiny?' ✨ Shiny!':''}`;
    document.getElementById('caught-popup').classList.remove('hidden');
    renderParty();
  } else if (result === 'faint') {
    setBattleLog(`Wild ${wildMon.name} fainted!`);
    await sleep(1200);
    closeBattle();
  } else if (result === 'fainted') {
    setBattleLog(`${playerParty[activeSlot].name} fainted!`);
    await sleep(1000);
    // Try next party member
    let next = playerParty.findIndex((m,i)=>i>activeSlot&&m.hp>0);
    if (next === -1) next = playerParty.findIndex((m,i)=>i!==activeSlot&&m.hp>0);
    if (next !== -1) {
      activeSlot = next;
      setBattleLog(`Go, ${playerParty[activeSlot].name}!`);
      document.getElementById('player-battle-sprite').src = playerParty[activeSlot].back;
      playerHP = playerParty[activeSlot].hp;
      playerMaxHP = playerParty[activeSlot].maxHP;
      updateHPBars();
      await sleep(800);
      disableBtns(false);
    } else {
      setBattleLog('All your Pokémon fainted! Returning to map...');
      // Heal all to full
      playerParty.forEach(m=>m.hp=m.maxHP);
      await sleep(1500);
      closeBattle();
    }
  }
}
 
function closeBattle() {
  document.getElementById('encounter').classList.add('hidden');
  inBattle = false;
  lastBattleTime = Date.now();
  renderParty();
  updateMarkerSprite();
}
 
// ─── PARTY UI ────────────────────────────────────────────
function renderParty() {
  const bar = document.getElementById('party-bar');
  bar.innerHTML = '';
  playerParty.forEach((mon,i) => {
    const slot = document.createElement('div');
    slot.className = 'party-slot'+(i===activeSlot?' active':'');
    const pct = (mon.hp/mon.maxHP)*100;
    slot.innerHTML = `<img src="${mon.sprite}" alt="${mon.name}"/><div class="hp-bar"><div class="hp-fill" style="width:${pct}%;background:${pct>50?'#1D9E75':pct>25?'#EF9F27':'#e24b4a'}"></div></div>`;
    slot.onclick = ()=>{ activeSlot=i; renderParty(); updateMarkerSprite(); };
    bar.appendChild(slot);
  });
}
 
// ─── NODE TOAST ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('node-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
 
// ─── BLE ─────────────────────────────────────────────────
const MESHTASTIC_SERVICE = '6ba1b218-15a8-461f-9fa8-5dcae273eafd';
const FROMRADIO_CHAR     = '2c55e69e-4993-11ed-b878-0242ac120002';
const FROMNUM_CHAR       = 'ed9da18c-a800-4f66-a670-aa7547e34453';
const TORADIO_CHAR_UUID  = 'f75c76d2-129e-4dad-a1dd-7866124401e7';
 
async function connectBLE() {
  const btn = document.getElementById('ble-btn');
  try {
    btn.textContent = 'Connecting...';
    device = await navigator.bluetooth.requestDevice({
      filters:[{services:[MESHTASTIC_SERVICE]}],
      optionalServices:[MESHTASTIC_SERVICE]
    }).catch(()=>navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:[MESHTASTIC_SERVICE]
    }));
    server = await device.gatt.connect();
    await sleep(600);
    const svc = await server.getPrimaryService(MESHTASTIC_SERVICE);
    fromRadioChar = await svc.getCharacteristic(FROMRADIO_CHAR);
    fromNumChar   = await svc.getCharacteristic(FROMNUM_CHAR);
    toRadioChar   = await svc.getCharacteristic(TORADIO_CHAR_UUID);
    await fromNumChar.startNotifications();
    fromNumChar.addEventListener('characteristicvaluechanged', onPacket);
    bleConnected = true;
    btn.textContent = '🔵 Connected';
    btn.classList.add('connected');
    showToast('📡 Meshtastic connected!');
    device.addEventListener('gattserverdisconnected',()=>{
      bleConnected=false;
      btn.textContent='Connect BLE';
      btn.classList.remove('connected');
    });
  } catch(e) {
    btn.textContent='Connect BLE';
    console.error(e);
  }
}
 
async function onPacket() {
  try {
    const val = await fromRadioChar.readValue();
    if (!val || val.byteLength < 2) return;
    const bytes = new Uint8Array(val.buffer);
    // Extract node ID
    const view = new DataView(val.buffer);
    let nodeId = null;
    for (let off of [4,0,8]) {
      if (bytes.length>=off+4){
        const c=view.getUint32(off,false);
        if(c>0x10000&&c!==0xFFFFFFFF){nodeId=c;break;}
      }
    }
    if (nodeId && !knownNodes[nodeId]) {
      knownNodes[nodeId]=true;
      showToast('📡 New node detected! Wild Pokémon incoming!');
      setTimeout(()=>maybeSpawnEncounter(),3000);
    }
  } catch(e){}
}
 
async function requestNodes() {
  if (!bleConnected||!toRadioChar) return;
  try { await toRadioChar.writeValue(new Uint8Array([0x18,0x01])); } catch(e){}
}
 
async function drainBuffer() {
  if (!bleConnected||!fromRadioChar) return;
  let empty=0;
  while(empty<3){
    try{
      const v=await fromRadioChar.readValue();
      if(!v||v.byteLength===0){empty++;}else{empty=0;onPacket();}
    }catch(e){empty++;}
    await sleep(150);
  }
}
 
// ─── BATTLE BUTTON EVENTS ────────────────────────────────
document.getElementById('btn-attack').onclick = doAttack;
document.getElementById('btn-catch').onclick  = doThrowBall;
document.getElementById('btn-run').onclick    = doRun;
document.getElementById('btn-swap').onclick   = ()=>{
  // Cycle to next living party member
  let next = (activeSlot+1)%playerParty.length;
  let tries=0;
  while(playerParty[next].hp<=0&&tries<playerParty.length){next=(next+1)%playerParty.length;tries++;}
  if(tries>=playerParty.length){setBattleLog('No other Pokémon available!');return;}
  activeSlot=next;
  const active=playerParty[activeSlot];
  playerHP=active.hp; playerMaxHP=active.maxHP;
  document.getElementById('player-battle-sprite').src=active.back;
  document.getElementById('player-label').textContent=active.name;
  updateHPBars();
  setBattleLog(`Go, ${active.name}!`);
  renderParty();
};
 
document.getElementById('ble-btn').onclick    = connectBLE;
document.getElementById('btn-scan').onclick   = requestNodes;
document.getElementById('btn-drain').onclick  = drainBuffer;
document.getElementById('caught-ok').onclick  = ()=>{
  document.getElementById('caught-popup').classList.add('hidden');
  inBattle=false;
  lastBattleTime=Date.now();
  renderParty();
  updateMarkerSprite();
};
 
// Heal party when near landmark
setInterval(()=>{
  if(!playerPos) return;
  LANDMARKS.forEach(lm=>{
    if(distM(playerPos.lat,playerPos.lng,lm.lat,lm.lng)<LANDMARK_RADIUS_M){
      playerParty.forEach(m=>m.hp=m.maxHP);
      renderParty();
    }
  });
},10000);
</script>
