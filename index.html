<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéMesh Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #f0f0f0; padding: 20px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: #888; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; }
    .dot.green { background: #1D9E75; }
    .dot.amber { background: #EF9F27; }
    button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: #1D9E75; color: white; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 24px; }
    button:disabled { background: #444; color: #888; cursor: default; }
    button:active { transform: scale(0.98); }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-size: 15px; font-weight: 500; }
    .count { font-size: 13px; color: #888; }
    .node-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .checkmark { width: 36px; height: 36px; border-radius: 50%; background: #0F6E56; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
    .node-name { font-size: 15px; font-weight: 500; }
    .node-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .empty { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .log { margin-top: 24px; background: #1a1d27; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; color: #666; min-height: 60px; max-height: 160px; overflow-y: auto; border: 1px solid #2a2d3a; }
    .log div { margin-bottom: 2px; }
    .log div.hi { color: #1D9E75; }
    .log div.er { color: #e24b4a; }
    .warn { background: #2a2000; border: 1px solid #554400; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #EF9F27; margin-bottom: 16px; display: none; }
  </style>
</head>
<body>
 
  <h1>PokéMesh Scanner</h1>
  <p class="subtitle">Discovers nearby Meshtastic nodes via Bluetooth</p>
 
  <div class="warn" id="no-ble">
    &#x26A0; Web Bluetooth not supported in this browser.<br>
    Use <strong>Chrome on desktop</strong> or <strong>BLE Link on iOS</strong>.
  </div>
 
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
 
  <button id="connect-btn">&#x1F4F6; Connect to Meshtastic</button>
 
  <div class="section-header">
    <span class="section-title">Discovered Nodes</span>
    <span class="count" id="count">0 found</span>
  </div>
 
  <div id="node-list">
    <div class="empty" id="empty-state">
      <div class="empty-icon">&#x1F4E1;</div>
      Connect to start scanning
    </div>
  </div>
 
  <div class="log" id="log"></div>
 
<script>
  const MESHTASTIC_SERVICE = '6ba1b218-15a8-461f-9fa8-5d6e91588c8a';
  const FROMRADIO_CHAR    = '2c55cbb9-5b76-4a30-95af-a62fc1f7e5d9';
  const FROMNUM_CHAR      = 'ed9da18c-a800-4f66-a670-aa7547e34453';
  const TORADIO_CHAR      = 'f75c76d2-129e-4dad-a1dd-7866124401e7';
 
  let nodes = {};
  let connected = false;
  let device, server, fromRadioChar, fromNumChar;
 
  const log = (msg, cls) => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = '> ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  };
 
  const setStatus = (text, state) => {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (state ? ' ' + state : '');
  };
 
  const addNode = (id, name, snr) => {
    if (nodes[id]) return;
    nodes[id] = true;
    document.getElementById('empty-state')?.remove();
    const count = Object.keys(nodes).length;
    document.getElementById('count').textContent = count + ' found';
    const shortId = Number(id).toString(16).toUpperCase().padStart(8,'0').slice(-4);
    const snrText = snr !== undefined ? ' &nbsp;·&nbsp; SNR: ' + snr + ' dB' : '';
    const card = document.createElement('div');
    card.className = 'node-card';
    card.innerHTML =
      '<div class="checkmark">&#x2713;</div>' +
      '<div style="flex:1">' +
        '<div class="node-name">' + (name || 'Unknown Node') + '</div>' +
        '<div class="node-meta">ID: !' + shortId + snrText + '</div>' +
      '</div>';
    document.getElementById('node-list').appendChild(card);
    log('Node discovered: ' + (name || '!' + shortId), 'hi');
  };
 
  const tryParseProtobuf = (bytes) => {
    // Walk the bytes looking for readable strings (node names)
    // and 4-byte sequences that look like node IDs
    let names = [];
    let i = 0;
    while (i < bytes.length) {
      if (bytes[i] >= 32 && bytes[i] < 127) {
        let str = '';
        let j = i;
        while (j < bytes.length && bytes[j] >= 32 && bytes[j] < 127) {
          str += String.fromCharCode(bytes[j]);
          j++;
        }
        if (str.length >= 2 && str.length <= 32) names.push(str);
        i = j;
      } else {
        i++;
      }
    }
    return names;
  };
 
  const parsePacket = (buffer) => {
    try {
      const bytes = new Uint8Array(buffer);
      if (bytes.length < 2) return;
 
      log('Packet received (' + bytes.length + ' bytes)');
 
      const view = new DataView(buffer);
      let nodeId = null;
      let snr = undefined;
 
      // Try to extract node ID from various offsets
      for (let offset of [4, 0, 8]) {
        if (bytes.length >= offset + 4) {
          const candidate = view.getUint32(offset, false);
          if (candidate !== 0 && candidate !== 0xFFFFFFFF && candidate > 0x1000) {
            nodeId = candidate;
            break;
          }
        }
      }
 
      // Try to find SNR (usually a small signed value)
      for (let offset of [bytes.length - 2, bytes.length - 4]) {
        if (offset >= 0) {
          const candidate = view.getInt8(offset);
          if (candidate >= -30 && candidate <= 15) {
            snr = candidate;
            break;
          }
        }
      }
 
      const names = tryParseProtobuf(bytes);
      const name = names.find(n => n.length >= 2 && !/^[0-9a-f]+$/i.test(n)) || null;
 
      if (!nodeId && name) {
        nodeId = Math.abs(name.split('').reduce((h, c) => Math.imul(31, h) + c.charCodeAt(0) | 0, 0));
      }
 
      if (nodeId || name) {
        addNode(nodeId || name, name, snr);
      }
    } catch(e) {
      log('Parse error: ' + e.message, 'er');
    }
  };
 
  const readFromRadio = async () => {
    try {
      const val = await fromRadioChar.readValue();
      if (val && val.byteLength > 0) parsePacket(val.buffer);
    } catch(e) {
      log('Read error: ' + e.message, 'er');
    }
  };
 
  const connectBLE = async () => {
    log('Requesting Bluetooth device...');
    setStatus('Connecting...', 'amber');
 
    // Try with Meshtastic service filter first, fall back to acceptAllDevices
    let dev;
    try {
      dev = await navigator.bluetooth.requestDevice({
        filters: [
          { services: [MESHTASTIC_SERVICE] },
          { namePrefix: 'Meshtastic' },
          { namePrefix: 'Heltec' },
          { namePrefix: 'T-Beam' },
          { namePrefix: 'RAK' },
          { namePrefix: 'TLora' }
        ],
        optionalServices: [MESHTASTIC_SERVICE]
      });
    } catch(e) {
      log('Filter scan failed, trying all devices...', 'er');
      try {
        dev = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [MESHTASTIC_SERVICE]
        });
      } catch(e2) {
        log('Bluetooth error: ' + e2.message, 'er');
        setStatus('Disconnected', '');
        return;
      }
    }
 
    device = dev;
    log('Found: ' + (device.name || 'unnamed device'));
 
    try {
      server = await device.gatt.connect();
      log('GATT connected');
    } catch(e) {
      log('GATT connect failed: ' + e.message, 'er');
      setStatus('Disconnected', '');
      return;
    }
 
    try {
      const service = await server.getPrimaryService(MESHTASTIC_SERVICE);
      fromRadioChar = await service.getCharacteristic(FROMRADIO_CHAR);
      fromNumChar   = await service.getCharacteristic(FROMNUM_CHAR);
 
      await fromNumChar.startNotifications();
      fromNumChar.addEventListener('characteristicvaluechanged', readFromRadio);
 
      connected = true;
      setStatus('Connected: ' + (device.name || 'device'), 'green');
 
      const btn = document.getElementById('connect-btn');
      btn.textContent = '✓ Connected';
      btn.disabled = true;
 
      const empty = document.getElementById('empty-state');
      if (empty) empty.innerHTML = '<div class="empty-icon">&#x1F4E1;</div>Scanning for nodes...';
 
      log('Listening for node packets...', 'hi');
 
      device.addEventListener('gattserverdisconnected', () => {
        connected = false;
        setStatus('Disconnected', '');
        log('Device disconnected', 'er');
        const btn = document.getElementById('connect-btn');
        btn.textContent = '📶 Reconnect';
        btn.disabled = false;
      });
 
    } catch(e) {
      log('Service error: ' + e.message, 'er');
      log('Device connected but Meshtastic service not found. Is this a Meshtastic node?', 'er');
      setStatus('Service not found', '');
    }
  };
 
  // Check Web Bluetooth support
  if (!navigator.bluetooth) {
    document.getElementById('no-ble').style.display = 'block';
    document.getElementById('connect-btn').disabled = true;
    log('Web Bluetooth not available in this browser', 'er');
  }
 
  document.getElementById('connect-btn').addEventListener('click', () => {
    if (!connected) connectBLE();
  });
</script>
</body>
</html>
