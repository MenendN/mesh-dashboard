<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéMesh Scanner</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #f0f0f0; padding: 20px; max-width: 480px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 13px; color: #888; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #e24b4a; flex-shrink: 0; }
    .dot.green { background: #1D9E75; }
    .dot.amber { background: #EF9F27; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    button { padding: 10px 8px; border-radius: 10px; border: none; background: #1D9E75; color: white; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:disabled { background: #2a2d3a; color: #555; cursor: default; }
    button:active:not(:disabled) { transform: scale(0.97); }
    #connect-btn { grid-column: span 2; font-size: 15px; padding: 12px; }
    #drain-btn { background: #1a3a8f; }
    #dump-btn  { background: #5a2d8f; }
    #clear-btn { background: #444; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-title { font-size: 15px; font-weight: 500; }
    .count { font-size: 13px; color: #888; }
    .node-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 10px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .checkmark { width: 36px; height: 36px; border-radius: 50%; background: #0F6E56; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
    .node-name { font-size: 15px; font-weight: 500; }
    .node-meta { font-size: 12px; color: #888; margin-top: 3px; }
    .empty { text-align: center; padding: 40px 20px; color: #555; font-size: 14px; }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }
    .log { margin-top: 24px; background: #1a1d27; border-radius: 10px; padding: 12px; font-family: monospace; font-size: 12px; color: #666; min-height: 80px; max-height: 200px; overflow-y: auto; border: 1px solid #2a2d3a; }
    .log div { margin-bottom: 2px; }
    .log div.hi { color: #1D9E75; }
    .log div.er { color: #e24b4a; }
    .log div.am { color: #EF9F27; }
    .log div.pu { color: #a78bfa; }
    .raw-hex { font-size: 10px; color: #444; word-break: break-all; }
  </style>
</head>
<body>
 
  <h1>PokéMesh Scanner</h1>
  <p class="subtitle">Discovers nearby Meshtastic nodes via Bluetooth</p>
 
  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
 
  <div class="btn-grid">
    <button id="connect-btn">&#x1F4F6; Connect to Meshtastic</button>
    <button id="scan-btn"  disabled>&#x1F4E1; Request Nodes</button>
    <button id="drain-btn" disabled>&#x23EC; Drain Buffer</button>
    <button id="dump-btn"  disabled>&#x1F4CB; Dump Raw Packets</button>
    <button id="clear-btn" disabled>&#x1F5D1; Clear List</button>
  </div>
 
  <div class="section-header">
    <span class="section-title">Discovered Nodes</span>
    <span class="count" id="count">0 found</span>
  </div>
 
  <div id="node-list">
    <div class="empty" id="empty-state">
      <div class="empty-icon">&#x1F4E1;</div>
      Connect then tap buttons to discover nodes
    </div>
  </div>
 
  <div class="log" id="log"></div>
 
<script>
  const MESHTASTIC_SERVICE = '6ba1b218-15a8-461f-9fa8-5dcae273eafd';
  const FROMRADIO_CHAR     = '2c55e69e-4993-11ed-b878-0242ac120002';
  const FROMNUM_CHAR       = 'ed9da18c-a800-4f66-a670-aa7547e34453';
  const TORADIO_CHAR       = 'f75c76d2-129e-4dad-a1dd-7866124401e7';
 
  let nodes = {};
  let connected = false;
  let device, server, fromRadioChar, fromNumChar, toRadioChar;
 
  const sleep = ms => new Promise(r => setTimeout(r, ms));
 
  const log = (msg, cls) => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    if (cls) line.className = cls;
    line.textContent = '> ' + msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  };
 
  const logRaw = (bytes) => {
    const el = document.getElementById('log');
    const line = document.createElement('div');
    line.className = 'raw-hex';
    line.textContent = '  HEX: ' + Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join(' ');
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;
  };
 
  const setStatus = (text, state) => {
    document.getElementById('status-text').textContent = text;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (state ? ' ' + state : '');
  };
 
  const setButtons = (on) => {
    ['scan-btn','drain-btn','dump-btn','clear-btn'].forEach(id => {
      document.getElementById(id).disabled = !on;
    });
    document.getElementById('connect-btn').disabled = on;
    document.getElementById('connect-btn').textContent = on ? '✓ Connected' : '📶 Connect to Meshtastic';
  };
 
  const addNode = (id, name, snr) => {
    if (nodes[id]) return;
    nodes[id] = true;
    document.getElementById('empty-state')?.remove();
    document.getElementById('count').textContent = Object.keys(nodes).length + ' found';
    const shortId = Number(id).toString(16).toUpperCase().padStart(8,'0').slice(-4);
    const card = document.createElement('div');
    card.className = 'node-card';
    card.innerHTML =
      '<div class="checkmark">&#x2713;</div>' +
      '<div style="flex:1">' +
        '<div class="node-name">' + (name || 'Unknown Node') + '</div>' +
        '<div class="node-meta">ID: !' + shortId + (snr !== undefined ? ' &nbsp;·&nbsp; SNR: ' + snr + ' dB' : '') + '</div>' +
      '</div>';
    document.getElementById('node-list').appendChild(card);
    log('Node discovered: ' + (name || '!' + shortId), 'hi');
  };
 
  const parsePacket = (buffer, showRaw) => {
    try {
      const bytes = new Uint8Array(buffer);
      if (bytes.length < 2) { log('Empty packet'); return; }
      log('Packet ' + bytes.length + ' bytes', 'am');
      if (showRaw) logRaw(bytes);
 
      const view = new DataView(buffer);
      let nodeId = null, name = null;
 
      for (let offset of [4, 0, 8, 12]) {
        if (bytes.length >= offset + 4) {
          const candidate = view.getUint32(offset, false);
          if (candidate > 0x10000 && candidate !== 0xFFFFFFFF) { nodeId = candidate; break; }
        }
      }
 
      let i = 0;
      while (i < bytes.length) {
        if (bytes[i] >= 32 && bytes[i] < 127) {
          let str = '', j = i;
          while (j < bytes.length && bytes[j] >= 32 && bytes[j] < 127) { str += String.fromCharCode(bytes[j]); j++; }
          if (str.length >= 2 && str.length <= 32 && !/^[0-9]+$/.test(str)) { name = str; break; }
          i = j;
        } else { i++; }
      }
 
      if (name) log('  Name found: ' + name, 'pu');
      if (nodeId) log('  ID found: ' + nodeId.toString(16), 'pu');
 
      if (!nodeId && name) nodeId = Math.abs(name.split('').reduce((h,c) => Math.imul(31,h)+c.charCodeAt(0)|0, 0));
      if (nodeId || name) addNode(nodeId, name, undefined);
      else log('  No node data in this packet');
    } catch(e) { log('Parse error: ' + e.message, 'er'); }
  };
 
  const readFromRadio = async (showRaw) => {
    try {
      if (!server.connected) return;
      const val = await fromRadioChar.readValue();
      if (val && val.byteLength > 0) parsePacket(val.buffer, showRaw);
      return val ? val.byteLength : 0;
    } catch(e) { log('Read error: ' + e.message, 'er'); return 0; }
  };
 
  // Drain: keep reading fromRadio until empty
  const drainBuffer = async () => {
    log('Draining buffer...', 'am');
    let count = 0, empty = 0;
    while (empty < 3 && count < 30) {
      const len = await readFromRadio(false);
      if (len === 0) empty++;
      else { empty = 0; count++; }
      await sleep(100);
    }
    log('Drain complete. ' + count + ' packets read.', 'hi');
  };
 
  // Dump: send want_config then drain showing raw hex
  const dumpPackets = async () => {
    log('Sending want_config request...', 'am');
    try {
      await toRadioChar.writeValue(new Uint8Array([0x18, 0x01]));
      log('Request sent, reading responses...', 'hi');
      await sleep(500);
      let count = 0, empty = 0;
      while (empty < 3 && count < 50) {
        const len = await readFromRadio(true);
        if (len === 0) empty++;
        else { empty = 0; count++; }
        await sleep(150);
      }
      log('Dump complete. ' + count + ' packets.', 'hi');
    } catch(e) { log('Dump error: ' + e.message, 'er'); }
  };
 
  const requestNodes = async () => {
    log('Requesting node info...', 'am');
    try {
      await toRadioChar.writeValue(new Uint8Array([0x18, 0x01]));
      log('Request sent!', 'hi');
    } catch(e) { log('Error: ' + e.message, 'er'); }
  };
 
  const setupService = async () => {
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        if (!server.connected) { server = await device.gatt.connect(); await sleep(500); }
        const service = await server.getPrimaryService(MESHTASTIC_SERVICE);
        log('Service found!', 'hi');
        fromRadioChar = await service.getCharacteristic(FROMRADIO_CHAR);
        fromNumChar   = await service.getCharacteristic(FROMNUM_CHAR);
        toRadioChar   = await service.getCharacteristic(TORADIO_CHAR);
        await fromNumChar.startNotifications();
        fromNumChar.addEventListener('characteristicvaluechanged', () => readFromRadio(false));
        connected = true;
        setStatus('Connected: ' + (device.name || 'device'), 'green');
        setButtons(true);
        const empty = document.getElementById('empty-state');
        if (empty) empty.innerHTML = '<div class="empty-icon">&#x1F4E1;</div>Scanning... tap buttons to force discovery';
        log('Connected! Tap "Drain Buffer" or "Dump Raw Packets" to find nodes.', 'hi');
        return true;
      } catch(e) {
        log('Attempt ' + attempt + ' failed: ' + e.message, 'er');
        if (attempt < 3) { await sleep(1000); }
      }
    }
    setStatus('Failed', '');
    document.getElementById('connect-btn').disabled = false;
    document.getElementById('connect-btn').textContent = '📶 Try Again';
    return false;
  };
 
  const connectBLE = async () => {
    log('Requesting Bluetooth device...');
    setStatus('Connecting...', 'amber');
    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [MESHTASTIC_SERVICE] }],
        optionalServices: [MESHTASTIC_SERVICE]
      });
    } catch(e) {
      try {
        device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: [MESHTASTIC_SERVICE]
        });
      } catch(e2) { log('Error: ' + e2.message, 'er'); setStatus('Disconnected',''); return; }
    }
    log('Found: ' + (device.name || 'unnamed'));
    try {
      server = await device.gatt.connect();
      log('GATT connected');
      await sleep(600);
    } catch(e) { log('GATT failed: ' + e.message, 'er'); setStatus('Disconnected',''); return; }
    await setupService();
    device.addEventListener('gattserverdisconnected', () => {
      connected = false;
      setStatus('Disconnected','');
      log('Disconnected','er');
      setButtons(false);
      document.getElementById('connect-btn').disabled = false;
      document.getElementById('connect-btn').textContent = '📶 Reconnect';
    });
  };
 
  if (!navigator.bluetooth) { log('Web Bluetooth not supported!','er'); document.getElementById('connect-btn').disabled = true; }
 
  document.getElementById('connect-btn').addEventListener('click', () => { if (!connected) connectBLE(); });
  document.getElementById('scan-btn').addEventListener('click', requestNodes);
  document.getElementById('drain-btn').addEventListener('click', drainBuffer);
  document.getElementById('dump-btn').addEventListener('click', dumpPackets);
  document.getElementById('clear-btn').addEventListener('click', () => {
    nodes = {};
    document.getElementById('node-list').innerHTML = '<div class="empty" id="empty-state"><div class="empty-icon">&#x1F4E1;</div>List cleared — tap a button to rediscover</div>';
    document.getElementById('count').textContent = '0 found';
    log('List cleared', 'am');
  });
</script>
</body>
</html>
