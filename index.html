<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Radar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --warn: #facc15; --text: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        #connect-btn { background-color: var(--accent); }
        #test-btn { background-color: var(--warn); }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-top: 15px; }
        #log { font-family: monospace; font-size: 0.8rem; background: #000; padding: 10px; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>
    <button id="connect-btn" class="btn">Connect Heltec V3 via BLE</button>
    <button id="test-btn" class="btn">📡 Broadcast Radar Test</button>
    <div class="card">
        <div id="status">Status: Disconnected</div>
        <div id="log"></div>
    </div>
    <script>
        const SVC = '6ba1b218-15a8-461f-9fa8-5dcae273eafd';
        const TO_RADIO = 'f75c693e-1a21-40e8-94b5-17f05b7705c2';
        let toChar;
        function log(m) { const l = document.getElementById('log'); l.innerHTML += `<div>${m}</div>`; l.scrollTop = l.scrollHeight; }

        document.getElementById('connect-btn').onclick = async () => {
            try {
                const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: [SVC] }] });
                const server = await dev.gatt.connect();
                const svc = await server.getPrimaryService(SVC);
                toChar = await svc.getCharacteristic(TO_RADIO);
                document.getElementById('status').innerText = "Status: Connected";
                log("Connected to Heltec.");
            } catch (e) { log("Error: " + e); }
        };

        document.getElementById('test-btn').onclick = async () => {
            if (!toChar) { log("Connect first!"); return; }
            await toChar.writeValue(new Uint8Array([0x12, 0x06, 0x0a, 0x04, 0x54, 0x45, 0x53, 0x54]));
            log("Test packet sent.");
        };
    </script>
</body>
</html>
