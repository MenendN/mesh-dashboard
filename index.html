<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Bar Monitor</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 { font-size: 1.25rem; margin: 0; }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: #ef4444;
            color: white;
        }
        .status-connected { background-color: var(--success); }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }
        .btn-secondary { background-color: #475569; color: white; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: var(--text-muted); }
        .data-value { font-weight: 500; font-family: monospace; }

        /* Cell-style Signal Bar Wrapper */
        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 24px;
            padding-right: 4px;
        }

        .bar {
            width: 6px;
            background-color: #334155; /* Default Dim Unlit State */
            border-radius: 2px;
            transition: background-color 0.2s ease;
        }
        .bar1 { height: 25%; }
        .bar2 { height: 50%; }
        .bar3 { height: 75%; }
        .bar4 { height: 100%; }

        #sig-status-text {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #console-log {
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #020617;
            padding: 12px;
            border-radius: 6px;
            line-height: 1.6;
        }
