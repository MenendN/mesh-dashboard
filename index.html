<style>
*{box-sizing:border-box;margin:0;padding:0;}

html, body {
  height:100%;
  overflow:hidden;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a1a2e;
  color:#fff;
  height:100vh;
  width:100vw;
  overflow:hidden;
}

/* ── STARTER SCREEN ── */
#starter-screen{
  position:absolute;
  inset:0;
  z-index:200;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}
#starter-screen.hidden{display:none;}
#starter-screen h1{
  font-size:30px;
  font-weight:800;
  color:#FFD700;
  text-shadow:0 0 20px #FFD70088;
  margin-bottom:4px;
}
#starter-screen p{
  font-size:13px;
  color:#aaa;
  margin-bottom:20px;
}

.starter-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:100%;
  max-width:380px;
}

.starter-card{
  background:#ffffff11;
  border:2px solid #ffffff22;
  border-radius:14px;
  padding:12px 6px;
  text-align:center;
  cursor:pointer;
  transition:all .2s;
}

.starter-card:active{
  border-color:#FFD700;
  background:#FFD70022;
  transform:scale(1.04);
}

.starter-card img{
  width:68px;
  height:68px;
  image-rendering:pixelated;
}

.starter-card .sname{
  font-size:11px;
  font-weight:700;
  margin-top:4px;
}

.starter-card .stype{
  font-size:10px;
  color:#aaa;
}

.shiny-badge{
  display:inline-block;
  background:#FFD700;
  color:#000;
  font-size:9px;
  font-weight:700;
  padding:1px 5px;
  border-radius:20px;
  margin-top:2px;
}

/* ── LOCATION PERMISSION SCREEN ── */
#location-screen{
  position:absolute;
  inset:0;
  z-index:190;
  background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px;
  text-align:center;
}

#location-screen.hidden{display:none;}

#location-screen .loc-icon{
  font-size:64px;
  margin-bottom:16px;
}

#location-screen h2{
  font-size:22px;
  font-weight:800;
  color:#FFD700;
  margin-bottom:10px;
}

#location-screen p{
  font-size:13px;
  color:#aaa;
  line-height:1.6;
  margin-bottom:8px;
  max-width:320px;
}

#location-screen .loc-note{
  font-size:11px;
  color:#666;
  margin-bottom:28px;
  max-width:300px;
}

#btn-allow-location{
  background:#1D9E75;
  color:#fff;
  border:none;
  padding:16px 40px;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  width:100%;
  max-width:300px;
  margin-bottom:12px;
}

#btn-allow-location:active{
  background:#0F6E56;
  transform:scale(0.98);
}

#btn-skip-location{
  background:transparent;
  color:#666;
  border:1px solid #333;
  padding:10px 24px;
  border-radius:10px;
  font-size:13px;
  cursor:pointer;
  width:100%;
  max-width:300px;
}

#location-status{
  font-size:12px;
  color:#aaa;
  margin-top:14px;
  min-height:18px;
}

/* ── MAIN LAYOUT ── */
#game-screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  height:100dvh;
  overflow:hidden;
}

/* ── TOP PANEL ── */
#top-panel{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:#1a1a2e;
  overflow:hidden;
}

/* TOPBAR */
#topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 14px;
  background:#0f1117;
  border-bottom:1px solid #ffffff11;
  z-index:10;
  flex-shrink:0;
}

#topbar .logo{
  font-size:17px;
  font-weight:800;
  color:#FFD700;
}

#ble-btn{
  background:#1D9E75;
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
}

#ble-btn.connected{
  background:#0F6E56;
}

/* MAIN CONTENT */
#main-area{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  padding:12px 14px;
  gap:10px;
  overflow-y:auto;
}

/* PARTY GRID */
#party-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.party-card{
  background:#0f1117;
  border:2px solid #ffffff15;
  border-radius:12px;
  padding:8px;
  text-align:center;
  cursor:pointer;
  transition:border .2s;
}

.party-card.active{
  border-color:#FFD700;
}

.party-card.fainted{
  opacity:.4;
}

.party-card img{
  width:52px;
  height:52px;
  image-rendering:pixelated;
}

.party-card .pname{
  font-size:11px;
  font-weight:600;
  margin-top:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.party-card .hp-bar{
  height:4px;
  background:#2a2d3a;
  border-radius:2px;
  margin-top:4px;
}

.party-card .hp-fill{
  height:100%;
  border-radius:2px;
  transition:width .3s;
}

/* INFO ROW */
#info-row{
  display:flex;
  gap:8px;
}

#node-count{
  flex:1;
  background:#0f1117;
  border-radius:10px;
  padding:10px;
  font-size:12px;
  color:#aaa;
  border:1px solid #ffffff11;
}

#node-count span{
  display:block;
  font-size:20px;
  font-weight:700;
  color:#1D9E75;
}

#gps-box{
  flex:1;
  background:#0f1117;
  border-radius:10px;
  padding:10px;
  font-size:11px;
  color:#aaa;
  border:1px solid #ffffff11;
  display:flex;
  flex-direction:column;
  gap:4px;
}

#gps-status-dot{
  display:inline-block;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#e24b4a;
  margin-right:4px;
  vertical-align:middle;
}

#gps-status-dot.active{
  background:#1D9E75;
}

#gps-coords{
  font-size:10px;
  color:#666;
  word-break:break-all;
}

#btn-refresh-gps{
  background:#1a3a8f;
  border:none;
  color:#fff;
  padding:4px 8px;
  border-radius:6px;
  font-size:10px;
  cursor:pointer;
  align-self:flex-start;
}

/* ACTION BUTTONS */
#action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

#action-row button{
  padding:10px;
  border-radius:10px;
  border:none;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  color:#fff;
}

#btn-scan{
  background:#1a3a8f;
}

#btn-drain{
  background:#2a2d3a;
}

/* ── MAP PANEL ── */
#map-panel{
  height:38vh;
  min-height:220px;
  position:relative;
  border-top:2px solid #FFD70033;
  flex-shrink:0;
}

#map{
  position:absolute;
  inset:0;
}

#node-toast{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  background:#1D9E75dd;
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  z-index:10;
  opacity:0;
  transition:opacity .3s;
  pointer-events:none;
  white-space:nowrap;
}

#node-toast.show{
  opacity:1;
}
</style>
