<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PokéMesh</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#fff;height:100vh;width:100vw;overflow:hidden;}

.screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
.screen.hidden{display:none!important;}

#starter-screen h1{font-size:28px;font-weight:800;color:#FFD700;text-shadow:0 0 20px #FFD70088;margin-bottom:4px;}
#starter-screen p{font-size:13px;color:#aaa;margin-bottom:18px;}
.starter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;}
.starter-card{background:#ffffff11;border:2px solid #ffffff22;border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.starter-card:active{border-color:#FFD700;background:#FFD70022;transform:scale(1.04);}
.starter-card img{width:68px;height:68px;image-rendering:pixelated;}
.starter-card .sname{font-size:11px;font-weight:700;margin-top:4px;}
.starter-card .stype{font-size:10px;color:#aaa;}
.shiny-badge{display:inline-block;background:#FFD700;color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;margin-top:2px;}

#location-screen .loc-icon{font-size:56px;margin-bottom:12px;}
#location-screen h2{font-size:22px;font-weight:800;color:#FFD700;margin-bottom:8px;}
#location-screen p{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:6px;max-width:300px;text-align:center;}
#location-screen .loc-note{font-size:11px;color:#666;margin-bottom:22px;max-width:280px;text-align:center;}
#btn-allow-location{background:#1D9E75;color:#fff;border:none;padding:14px 36px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:280px;margin-bottom:10px;}
#btn-skip-location{background:transparent;color:#666;border:1px solid #333;padding:9px 20px;border-radius:10px;font-size:13px;cursor:pointer;width:100%;max-width:280px;}
#location-status{font-size:12px;color:#aaa;margin-top:12px;min-height:18px;text-align:center;}

#game-screen{position:fixed;inset:0;display:flex;flex-direction:column;}
#game-screen.hidden{display:none;}

#top-panel{flex:1 1 0;min-height:0;display:flex;flex-direction:column;background:#1a1a2e;overflow:hidden;}
#topbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#0f1117;border-bottom:1px solid #ffffff11;flex-shrink:0;}
#topbar .logo{font-size:16px;font-weight:800;color:#FFD700;flex:1;}
#ble-btn{background:#1D9E75;border:none;color:#fff;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;}
#ble-btn.connected{background:#0F6E56;}
#btn-save{background:#2a2d3a;border:none;color:#aaa;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;}
#btn-team{background:#1a3a8f;border:none;color:#fff;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;}

#main-area{flex:1;display:flex;flex-direction:column;padding:10px 12px;gap:8px;overflow-y:auto;}

/* PARTY */
#party-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.party-card{background:#0f1117;border:2px solid #ffffff15;border-radius:12px;padding:7px;text-align:center;cursor:pointer;transition:border .2s;position:relative;}
.party-card.active{border-color:#FFD700;}
.party-card.fainted{opacity:.4;}
.party-card img{width:48px;height:48px;image-rendering:pixelated;}
.party-card .pname{font-size:10px;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.party-card .hp-bar{height:4px;background:#2a2d3a;border-radius:2px;margin-top:3px;}
.party-card .hp-fill{height:100%;border-radius:2px;transition:width .3s;}
.party-card .xp-bar{height:3px;background:#1a1a2e;border-radius:2px;margin-top:2px;}
.party-card .xp-fill{height:100%;border-radius:2px;background:#8866ff;transition:width .4s;}
.party-card .plvl{font-size:9px;color:#8866ff;font-weight:700;}
.lvlup-badge{position:absolute;top:-6px;right:-6px;background:#FFD700;color:#000;font-size:8px;font-weight:800;padding:2px 5px;border-radius:10px;animation:popIn .3s ease;z-index:5;}
@keyframes popIn{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}

.xp-popup{position:fixed;z-index:500;background:#8866ffee;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;pointer-events:none;animation:xpFloat 1.6s ease forwards;}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) translateX(-50%);}100%{opacity:0;transform:translateY(-40px) translateX(-50%);}}

/* BALLS */
#balls-row{display:flex;align-items:center;gap:8px;background:#0f1117;border-radius:10px;padding:8px 10px;border:1px solid #ffffff11;min-height:44px;flex-wrap:wrap;}
.ball-chip{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;background:#1a1a2e;padding:4px 8px;border-radius:20px;border:1px solid #ffffff22;}
.ball-chip img{width:18px;height:18px;image-rendering:pixelated;}
.ball-chip.empty{opacity:.3;}

/* NO BALLS */
#no-balls-banner{display:none;background:#e24b4a22;border:1px solid #e24b4a55;border-radius:10px;padding:8px 12px;font-size:11px;color:#e24b4a;text-align:center;flex-shrink:0;}
#no-balls-banner button{background:#e24b4a;color:#fff;border:none;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;margin-top:4px;}

/* IDLE SCENE */
#idle-scene{background:#0f1117;border-radius:12px;border:1px solid #ffffff11;overflow:hidden;position:relative;height:80px;flex-shrink:0;}
#idle-canvas{width:100%;height:100%;display:block;}
#idle-scene .idle-label{position:absolute;bottom:4px;right:8px;font-size:9px;color:#333;pointer-events:none;}

/* INFO */
#info-row{display:flex;gap:8px;}
#node-count{flex:1;background:#0f1117;border-radius:10px;padding:8px;font-size:11px;color:#aaa;border:1px solid #ffffff11;}
#node-count span{display:block;font-size:18px;font-weight:700;color:#1D9E75;}
#gps-box{flex:1;background:#0f1117;border-radius:10px;padding:8px;font-size:11px;color:#aaa;border:1px solid #ffffff11;display:flex;flex-direction:column;gap:3px;}
#gps-dot{display:inline
