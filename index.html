<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PokéMesh</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system,sans-serif;
  background:#1a1a2e;
  color:#fff;
  overflow:hidden;
}

/* TOP */
#topbar{
  display:flex;
  gap:6px;
  padding:8px;
  background:#0f1117;
}
#topbar button{
  font-size:11px;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  color:#fff;
  background:#2a2d3a;
}
#topbar .logo{
  flex:1;
  color:#FFD700;
  font-weight:800;
}

/* LAYOUT */
#wrap{
  display:grid;
  grid-template-rows: 55vh 45vh;
  height:100vh;
}

/* PANEL */
#panel{
  padding:8px;
  overflow:auto;
}

/* PARTY */
#party{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
}
.card{
  background:#0f1117;
  padding:6px;
  border-radius:10px;
  text-align:center;
}
.card img{width:48px}
.active{outline:2px solid gold}

/* BALLS */
#balls{
  margin-top:6px;
  font-size:11px;
  color:#aaa;
}

/* INFO */
#info{
  margin-top:6px;
  font-size:11px;
  color:#aaa;
}

/* NODES */
#nodes{
  margin-top:8px;
  background:#0f1117;
  padding:6px;
  border-radius:10px;
  max-height:120px;
  overflow:auto;
}
.node{
  font-size:10px;
  padding:4px;
  border-bottom:1px solid #222;
  display:flex;
  justify-content:space-between;
}

/* MAP */
#map{height:45vh}

/* BATTLE */
#battle{
  position:fixed;
  inset:0;
  background:#000d;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
#battle.active{display:flex}
#log{margin-top:10px;font-size:12px}
button.move{
  margin:4px;
  padding:6px 10px;
}
</style>
</head>

<body>

<div id="wrap">

  <div id="topbar">
    <div class="logo">⚡ PokéMesh</div>
    <button onclick="save()">💾 Save</button>
    <button onclick="connectBLE()">BLE</button>
  </div>

  <div id="panel">

    <div id="party"></div>

    <div id="balls">Balls: <span id="balltxt"></span></div>

    <div id="info">Nodes: <span id="nodecount">0</span></div>

    <div id="nodes"></div>

  </div>

  <div id="map"></div>

</div>

<!-- BATTLE -->
<div id="battle">
  <img id="wild" width="96"/>
  <div id="log">Battle</div>
  <div id="moves"></div>
  <button onclick="closeBattle()">Run</button>
</div>

<script>
/* ---------------- STATE ---------------- */
let party=[];
let active=0;
let balls={poke:5,great:0,ultra:0,master:0};
let nodes={};
let map,marker;
let inBattle=false;
let wild=null;

/* ---------------- DATA ---------------- */
const BALLS={
 poke:{w:70},great:{w:22},ultra:{w:7},master:{w:1}
};

const MOVES={
 tackle:{p:40},ember:{p:40},water:{p:40},thunder:{p:40},bite:{p:60}
};

const SETS={
 25:['thunder','tackle','bite','bite'],
 1:['tackle','bite','tackle','bite']
};

/* ---------------- INIT ---------------- */
function start(){
  party=[mon(25)];
  map=L.map('map').setView([47.62,-122.33],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  render();
}
start();

/* ---------------- MON ---------------- */
function mon(id){
  return {
    id,
    name:"Mon "+id,
    hp:100,
    max:100,
    moves:(SETS[id]||['tackle','bite','tackle','bite']).map(m=>({...MOVES[m],name:m,pp:10,pp_left:10}))
  }
}

/* ---------------- UI ---------------- */
function render(){
  const p=document.getElementById("party");
  p.innerHTML="";
  party.forEach((m,i)=>{
    const d=document.createElement("div");
    d.className="card"+(i==active?" active":"");
    d.innerHTML=`<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${m.id}.png">
    <div>${m.name}</div>`;
    d.onclick=()=>active=i;
    p.appendChild(d);
  });

  document.getElementById("balltxt").innerText=JSON.stringify(balls);
  document.getElementById("nodecount").innerText=Object.keys(nodes).length;

  const n=document.getElementById("nodes");
  n.innerHTML="";
  Object.keys(nodes).forEach(k=>{
    let d=document.createElement("div");
    d.className="node";
    d.innerHTML=`<span>${k}</span><span>📡</span>`;
    n.appendChild(d);
  });
}

/* ---------------- SAVE ---------------- */
function save(){
  localStorage.setItem("pokemesh",JSON.stringify({party,balls,nodes}));
}

/* ---------------- LOAD ---------------- */
(function(){
  let s=localStorage.getItem("pokemesh");
  if(s){
    let d=JSON.parse(s);
    party=d.party||[];
    balls=d.balls||balls;
    nodes=d.nodes||{};
  }
})();

/* ---------------- BATTLE ---------------- */
function battle(){
  if(inBattle)return;
  inBattle=true;
  wild={hp:80,name:"Wild Mon"};
  document.getElementById("battle").classList.add("active");

  const m=document.getElementById("moves");
  m.innerHTML="";

  party[active].moves.forEach((mv,i)=>{
    let b=document.createElement("button");
    b.className="move";
    b.innerText=mv.name;
    b.onclick=()=>attack(mv);
    m.appendChild(b);
  });
}

function attack(mv){
  wild.hp-=mv.p;
  if(wild.hp<=0){
    drop();
    closeBattle();
  }
  document.getElementById("log").innerText="Hit!";
}

function closeBattle(){
  inBattle=false;
  document.getElementById("battle").classList.remove("active");
}

/* ---------------- DROPS ---------------- */
function drop(){
  let list=[];
  for(let i=0;i<2;i++){
    let r=Math.random()*100,c=0;
    for(let k in BALLS){
      c+=BALLS[k].w;
      if(r<c){balls[k]=(balls[k]||0)+1;list.push(k);break;}
    }
  }
  render();
}

/* ---------------- BLE (stub) ---------------- */
function connectBLE(){
  let id=Math.floor(Math.random()*9999);
  nodes[id]=true;
  render();
  if(Math.random()<0.5)battle();
}

/* AUTO LOOP DEMO */
setInterval(()=>{
  if(Math.random()<0.3){
    let id=Math.floor(Math.random()*9999);
    nodes[id]=true;
    render();
  }
},5000);

</script>

</body>
</html>
