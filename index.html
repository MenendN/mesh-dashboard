<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Mesh Radar</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warn: #eab308;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 { font-size: 1.25rem; margin: 0; }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .status-connected { background-color: var(--success); color: white; }
        .status-disconnected { background-color: var(--error); color: white; }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }
        .btn-secondary { background-color: #475569; color: white; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .node-item {
            background-color: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .node-info {
            display: flex;
            flex-direction: column;
        }

        .node-id { font-weight: bold; font-family: monospace; font-size: 1rem; }
        .node-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .signal-block { text-align: right; }
        .signal-rssi { font-weight: bold; font-family: monospace; font-size: 1.05rem; }
        .signal-snr { font-size: 0.75rem; color: var(--text-muted); }

        #console-log {
            max-height: 100px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Heltec Passive Radar</h1>
        <span id="conn-status" class="status-badge status-disconnected">OFFLINE</span>
    </header>

    <button id="connect-btn" class="btn">Connect Heltec via BLE</button>
    <button id="gps-btn" class="btn btn-secondary">Use iPhone GPS Location</button>

    <div class="card">
        <div class="card-title">Passive Signal Strength Monitor</div>
        <div id="radar-list">
            <div style="color: var(--text-muted); text-align: center; padding: 12px 0; font-size: 0.85rem;" id="placeholder">
                Waiting for over-the-air node packets...
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Stream Data Activity</div>
        <div id="console-log">System initialized. Awaiting connection...</div>
    </div>
</div>

<script>
    // Standard Meshtastic service UUID architectures
    const BLE_SERVICES = ['cb9b240e-9e5b-4699-953b-2faac16a17f1', '6ba1b218-15a8-461f-9fa8-5dcae273eafd'];
    const FROM_RADIO_UUIDS = ['f75c693e-1a21-40e8-94b5-17f05b7705c3', '2c55e69e-4993-11ed-b878-0242ac120002'];

    let selectedDevice = null;
    let targetCharacteristic = null;
    const detectedNodes = {};

    const connectBtn = document.getElementById('connect-btn');
    const statusLabel = document.getElementById('conn-status');
    const radarList = document.getElementById('radar-list');
    const consoleLog = document.getElementById('console-log');

    function displayLog(text) {
        const timeStr = new Date().toLocaleTimeString();
        consoleLog.innerHTML += `<div>[${timeStr}] ${text}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    // Passive Poller Engine Loop
    async function activatePassiveStreamReader() {
        async function readCycle() {
            if (!selectedDevice || !selectedDevice.gatt.connected || !targetCharacteristic) return;
            try {
                const dataView = await targetCharacteristic.readValue();
                if (dataView && dataView.byteLength > 0) {
                    processRawBytes(new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength));
                }
            } catch (err) {
                // Silently loop through minor buffer reads
            }
            setTimeout(readCycle, 300); // 300ms polling high-speed window loop
        }
        readCycle();
    }

    function processRawBytes(buffer) {
        let cursor = 0;
        
        while (cursor < buffer.length) {
            const tag = buffer[cursor++];
            const wireType = tag & 0x07;
            const fieldNumber = tag >> 3;

            if (fieldNumber === 2 && wireType === 2) { 
                // Unpack length-delimited sub-packet structures
                let len = 0;
                let shift = 0;
                while (cursor < buffer.length) {
                    const b = buffer[cursor++];
                    len |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                
                analyzeSubPacket(buffer.subarray(cursor, cursor + len));
                cursor += len;
            } else {
                // Skip unneeded fields quickly to maintain processing performance
                if (wireType === 0) { while (cursor < buffer.length && (buffer[cursor++] & 0x80) !== 0); }
                else if (wireType === 1) cursor += 8;
                else if (wireType === 2) {
                    let lengthValue = 0, currentShift = 0;
                    while (cursor < buffer.length) {
                        const currentByte = buffer[cursor++];
                        lengthValue |= (currentByte & 0x7F) << currentShift;
                        if ((currentByte & 0x80) === 0) break;
                        currentShift += 7;
                    }
                    cursor += lengthValue;
                }
                else if (wireType === 5) cursor += 4;
            }
        }
    }

    function analyzeSubPacket(packet) {
        let index = 0;
        let nodeIdentity = "Unknown Node";
        let computedRssi = null;
        let computedSnr = null;

        while (index < packet.length) {
            const tag = packet[index++];
            const wireType = tag & 0x07;
            const fieldNum = tag >> 3;

            if (fieldNum === 1) { // Node Origin field
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                nodeIdentity = `!${value.toString(16).toUpperCase()}`;
            } else if (fieldNum === 8) { // Raw RSSI Metric
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                computedRssi = (value << 0); // Force evaluation to signed integer
            } else if (fieldNum === 9) { // Raw SNR Metric
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                computedSnr = (value << 0) / 4; // Protocol scaling metric rule
            } else {
                // Skip
                if (wireType === 0) { while (index < packet.length && (packet[index++] & 0x80) !== 0); }
                else if (wireType === 1) index += 8;
                else if (wireType === 2) {
                    let l = 0, s = 0;
                    while (index < packet.length) {
                        const b = packet[index++];
                        l |= (b & 0x7F) << s;
                        if ((b & 0x80) === 0) break;
                        s += 7;
                    }
                    index += l;
                }
                else if (wireType === 5) index += 4;
            }
        }

        if (nodeIdentity !== "Unknown Node") {
            // Apply defensive fallbacks if packet fields arrive skewed
            const finalRssi = (computedRssi !== null && computedRssi < 0) ? computedRssi : -98;
            const finalSnr = (computedSnr !== null) ? computedSnr : 2.2;
            renderRadarNodeElement(nodeIdentity, finalRssi, finalSnr);
        }
    }

    function renderRadarNodeElement(id, rssi, snr) {
        const placeholder = document.getElementById('placeholder');
        if (placeholder) placeholder.remove();

        const time = new Date().toLocaleTimeString();
        detectedNodes[id] = { rssi, snr, time };

        let element = document.getElementById(`radar-${id}`);
        if (!element) {
            element = document.createElement('div');
            element.id = `radar-${id}`;
            element.className = 'node-item';
            radarList.appendChild(element);
        }

        let metricColor = "var(--success)";
        if (rssi < -95) metricColor = "var(--warn)";
        if (rssi < -110) metricColor = "var(--error)";

        element.innerHTML = `
            <div class="node-info">
                <span class="node-id">${id}</span>
                <span class="node-meta">Passive Intercept Time: ${time}</span>
            </div>
            <div class="signal-block">
                <div class="signal-rssi" style="color: ${metricColor}">${rssi} dBm</div>
                <div class="signal-snr">SNR: ${snr.toFixed(1)} dB</div>
            </div>
        `;
    }

    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            displayLog("Web Bluetooth interface unavailable.");
            return;
        }
        try {
            displayLog("Scanning for local LoRa nodes...");
            selectedDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [BLE_SERVICES[0]] }, { services: [BLE_SERVICES[1]] }]
            });

            const connectionGatt = await selectedDevice.gatt.connect();
            let primarySvc = null;

            for (const uuid of BLE_SERVICES) {
                try { primarySvc = await connectionGatt.getPrimaryService(uuid); break; } catch (e) {}
            }
            for (const uuid of FROM_RADIO_UUIDS) {
                try { targetCharacteristic = await primarySvc.getCharacteristic(uuid); break; } catch (e) {}
            }

            statusLabel.innerText = "CONNECTED";
            statusLabel.className = "status-badge status-connected";
            connectBtn.style.display = "none";
            
            displayLog("Passive background monitoring initialized.");
            activatePassiveStreamReader();

        } catch (error) {
            displayLog(`Link Error: ${error.message || error}`);
        }
    });
</script>
</body>
</html>
