<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Data Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
        }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: #334155;
        }

        .status-connected { background-color: var(--success); color: white; }
        .status-disconnected { background-color: var(--error); color: white; }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn:active {
            opacity: 0.9;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            color: var(--accent);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: var(--text-muted);
        }

        .data-value {
            font-weight: 500;
            font-family: monospace;
        }

        #log-container {
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            color: #a7f3d0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Heltec V3 Data</h1>
        <span id="connection-status" class="status-badge status-disconnected">OFFLINE</span>
    </header>

    <button id="connect-btn" class="btn">Connect Heltec V3 via BLE</button>
    <button id="phone-gps-btn" class="btn btn-secondary">Use iPhone GPS Location</button>

    <div class="card">
        <div class="card-title">
            <span>GPS Coordinates</span>
            <span id="gps-source" class="source-tag">No Data</span>
        </div>
        <div class="data-row">
            <span class="data-label">Latitude</span>
            <span id="gps-lat" class="data-value">Waiting...</span>
        </div>
        <div class="data-row">
            <span class="data-label">Longitude</span>
            <span id="gps-lng" class="data-value">Waiting...</span>
        </div>
        <div class="data-row">
            <span class="data-label">Altitude</span>
            <span id="gps-alt" class="data-value">Waiting...</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Mesh Telemetry & Data</div>
        <div class="data-row">
            <span class="data-label">Sender Node ID</span>
            <span id="mesh-sender" class="data-value">--</span>
        </div>
        <div class="data-row">
            <span class="data-label">Packet ID</span>
            <span id="mesh-packet-id" class="data-value">--</span>
        </div>
        <div class="data-row">
            <span class="data-label">Hop Limit</span>
            <span id="mesh-hop-limit" class="data-value">--</span>
        </div>
        <div class="data-row">
            <span class="data-label">Payload Size</span>
            <span id="mesh-payload-len" class="data-value">0 bytes</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Console Activity</div>
        <div id="log-container">System ready. Tap connect.</div>
    </div>
</div>

<script>
    // Expanded mappings to prevent Service/Characteristic cross-matching mismatches
    const SERVICE_UUIDS = [
        'cb9b240e-9e5b-4699-953b-2faac16a17f1',
        '6ba1b218-15a8-461f-9fa8-5dcae273eafd'
    ];

    const FROM_RADIO_UUIDS = [
        'f75c693e-1a21-40e8-94b5-17f05b7705c3',
        '2c55e69e-4993-11ed-b878-0242ac120002'
    ];

    let bleDevice = null;
    let fromRadioChar = null;
    let isPolling = false;
    let watchId = null;

    const connectBtn = document.getElementById('connect-btn');
    const phoneGpsBtn = document.getElementById('phone-gps-btn');
    const statusBadge = document.getElementById('connection-status');
    const logBox = document.getElementById('log-container');
    const gpsSource = document.getElementById('gps-source');

    function logger(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div>[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // iPhone Native GPS Handshake Engine
    phoneGpsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            alert("Your browser environment does not support core geolocation frameworks.");
            return;
        }

        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            phoneGpsBtn.innerText = "Use iPhone GPS Location";
            phoneGpsBtn.style.backgroundColor = "#475569";
            gpsSource.innerText = "No Data";
            logger("iPhone GPS tracking engine halted.");
            return;
        }

        logger("Requesting secure iOS CoreLocation permissions...");
        
        watchId = navigator.geolocation.watchPosition(
            (position) => {
                gpsSource.innerText = "iPhone GPS";
                document.getElementById('gps-lat').innerText = position.coords.latitude.toFixed(6);
                document.getElementById('gps-lng').innerText = position.coords.longitude.toFixed(6);
                
                if (position.coords.altitude !== null) {
                    document.getElementById('gps-alt').innerText = `${position.coords.altitude.toFixed(1)} meters`;
                } else {
                    document.getElementById('gps-alt').innerText = "Unavailable";
                }
                
                logger(`Location update polled natively from iPhone hardware.`);
            },
            (error) => {
                logger(`GPS Error: ${error.message}`);
                alert(`Could not acquire location: ${error.message}`);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );

        phoneGpsBtn.innerText = "Stop iPhone GPS";
        phoneGpsBtn.style.backgroundColor = "#e11d48";
    });

    // Cross-firmware Bluetooth Pairing Engine
    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) {
            alert("Web Bluetooth API not detected.");
            return;
        }

        try {
            logger("Scanning for Meshtastic hardware...");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [
                    { services: [SERVICE_UUIDS[0]] },
                    { services: [SERVICE_UUIDS[1]] }
                ]
            });

            logger(`Found: ${bleDevice.name}. Connecting to GATT...`);
            const server = await bleDevice.gatt.connect();

            logger("Querying target service architecture...");
            let primaryService = null;
            for (const uuid of SERVICE_UUIDS) {
                try {
                    primaryService = await server.getPrimaryService(uuid);
                    logger(`Bound to service: ${uuid.substring(0,8)}...`);
                    break;
                } catch (e) { continue; }
            }

            if (!primaryService) throw new Error("GATT service architecture identification failure.");

            logger("Probing notify structures...");
            for (const uuid of FROM_RADIO_UUIDS) {
                try {
                    fromRadioChar = await primaryService.getCharacteristic(uuid);
                    logger(`Successfully matched pipeline characteristic: ${uuid.substring(0,8)}...`);
                    break;
                } catch (e) { continue; }
            }

            if (!fromRadioChar) throw new Error("FromRadio pipeline characteristic completely unavailable on this channel match.");
            
            statusBadge.innerText = "CONNECTED";
            statusBadge.className = "status-badge status-connected";
            connectBtn.style.display = "none";

            try {
                logger("Attempting stream subscription...");
                await fromRadioChar.startNotifications();
                fromRadioChar.addEventListener('characteristicvaluechanged', (e) => processIncomingBytes(e.target.value));
                logger("Streaming active via direct firmware notifications.");
            } catch (notifyErr) {
                logger("Notification pipe rejected. Initiating backup polling loop framework...");
                startFallbackPolling();
            }

        } catch (err) {
            logger(`Error: ${err.message || err}`);
            console.error(err);
        }
    });

    function startFallbackPolling() {
        if (isPolling) return;
        isPolling = true;
        
        async function poll() {
            if (!bleDevice || !bleDevice.gatt.connected || !fromRadioChar) {
                isPolling = false;
                return;
            }
            try {
                const view = await fromRadioChar.readValue();
                if (view && view.byteLength > 0) {
                    processIncomingBytes(view);
                }
            } catch (e) {}
            setTimeout(poll, 800);
        }
        poll();
    }

    function processIncomingBytes(view) {
        if (!view || view.byteLength === 0) return;

        const bytes = new Uint8Array(view.buffer, view.byteOffset, view.byteLength);
        document.getElementById('mesh-payload-len').innerText = `${bytes.length} bytes`;
        
        parseFromRadioProtobuf(bytes);
    }

    function parseFromRadioProtobuf(bytes) {
        let i = 0;
        while (i < bytes.length) {
            const key = bytes[i];
            const type = key & 0x07;
            const fieldNum = key >> 3;
            i++;

            if (fieldNum === 2 && type === 2) { 
                const [packetLen, nextIdx] = readVarint(bytes, i);
                i = nextIdx;
                const packetEnd = i + packetLen;
                parseMeshPacket(bytes.subarray(i, packetEnd));
                i = packetEnd;
            } else {
                i = skipVarintField(bytes, i, type);
            }
        }
    }

    function parseMeshPacket(packetBytes) {
        let i = 0;
        while (i < packetBytes.length) {
            const key = packetBytes[i];
            const type = key & 0x07;
            const fieldNum = key >> 3;
            i++;

            if (fieldNum === 1) { 
                const [val, nextIdx] = readVarint(packetBytes, i);
                document.getElementById('mesh-sender').innerText = `!${val.toString(16)}`;
                i = nextIdx;
            } else if (fieldNum === 3) { 
                const [val, nextIdx] = readVarint(packetBytes, i);
                document.getElementById('mesh-packet-id').innerText = val;
                i = nextIdx;
            } else if (fieldNum === 4) { 
                const [val, nextIdx] = readVarint(packetBytes, i);
                document.getElementById('mesh-hop-limit').innerText = val;
                i = nextIdx;
            } else if (fieldNum === 7 && type === 2) { 
                const [len, nextIdx] = readVarint(packetBytes, i);
                i = nextIdx;
                const end = i + len;
                parseDataPayload(packetBytes.subarray(i, end));
                i = end;
            } else {
                i = skipVarintField(packetBytes, i, type);
            }
        }
    }

    function parseDataPayload(payloadBytes) {
        let i = 0;
        let portnum = 0;
        let innerData = null;

        while (i < payloadBytes.length) {
            const key = payloadBytes[i];
            const type = key & 0x07;
            const fieldNum = key >> 3;
            i++;

            if (fieldNum === 1) { 
                const [val, nextIdx] = readVarint(payloadBytes, i);
                portnum = val; 
                i = nextIdx;
            } else if (fieldNum === 2 && type === 2) { 
                const [len, nextIdx] = readVarint(payloadBytes, i);
                i = nextIdx;
                innerData = payloadBytes.subarray(i, i + len);
                i += len;
            } else {
                i = skipVarintField(payloadBytes, i, type);
            }
        }

        // Only parse incoming GPS packet positions if phone location is inactive
        if (portnum === 3 && innerData && watchId === null) {
            extractGPS(innerData);
        }
    }

    function extractGPS(gpsBytes) {
        let i = 0;
        while (i < gpsBytes.length) {
            const key = gpsBytes[i];
            const type = key & 0x07;
            const fieldNum = key >> 3;
            i++;

            if (fieldNum === 1) { 
                const [val, nextIdx] = readVarint(gpsBytes, i);
                const signedLat = (val << 0) / 10000000;
                document.getElementById('gps-lat').innerText = signedLat.toFixed(6);
                gpsSource.innerText = "Node Mesh";
                i = nextIdx;
            } else if (fieldNum === 2) { 
                const [val, nextIdx] = readVarint(gpsBytes, i);
                const signedLng = (val << 0) / 10000000;
                document.getElementById('gps-lng').innerText = signedLng.toFixed(6);
                gpsSource.innerText = "Node Mesh";
                i = nextIdx;
            } else if (fieldNum === 3) { 
                const [val, nextIdx] = readVarint(gpsBytes, i);
                document.getElementById('gps-alt').innerText = `${val} meters`;
                i = nextIdx;
            } else {
                i = skipVarintField(gpsBytes, i, type);
            }
        }
    }

    function readVarint(bytes, index) {
        let value = 0;
        let shift = 0;
        while (index < bytes.length) {
            const byte = bytes[index++];
            value |= (byte & 0x7F) << shift;
            if ((byte & 0x80) === 0) break;
            shift += 7;
        }
        return [value, index];
    }

    function skipVarintField(bytes, index, type) {
        if (type === 0) { 
            while (index < bytes.length && (bytes[index++] & 0x80) !== 0);
        } else if (type === 1) { 
            index += 8;
        } else if (type === 2) { 
            const [len, nextIdx] = readVarint(bytes, index);
            index = nextIdx + len;
        } else if (type === 5) { 
            index += 4;
        }
        return index;
    }
</script>
</body>
</html>
