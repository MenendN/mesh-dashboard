<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PokéMesh Fixed</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:sans-serif;
  background:#111827;
  color:white;
  height:100dvh;
  overflow:hidden;
}

.hidden{
  display:none!important;
}

#starter-screen,
#game-screen{
  position:absolute;
  inset:0;
}

#starter-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
}

#starter-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  width:320px;
}

.starter-card{
  background:#1f2937;
  border:1px solid #374151;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
}

.starter-card img{
  width:72px;
  height:72px;
  image-rendering:pixelated;
}

#topbar{
  height:56px;
  background:#0f172a;
  display:flex;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid #1f2937;
  z-index:50;
  position:relative;
}

.logo{
  font-weight:700;
  color:#FFD700;
}

#field-area{
  position:absolute;
  top:56px;
  left:0;
  right:0;
  bottom:70px;
  background:linear-gradient(#87CEEB 0%,#87CEEB 55%,#4a8a3a 55%);
  overflow:hidden;
}

#field-mons{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:33%;
}

.field-mon{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
}

.field-mon img{
  width:72px;
  height:72px;
  image-rendering:pixelated;
}

.field-mon div{
  margin-top:8px;
  font-size:18px;
}

#map-overlay{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:33%;
  z-index:20;
  border-top:2px solid #1f2937;
  overflow:hidden;
  background:#000;
}

#map{
  width:100%;
  height:100%;
}

#bottom-nav{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:70px;
  background:#0f172a;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  border-top:1px solid #1f2937;
  z-index:100;
}

.nav-btn{
  background:none;
  border:none;
  color:#9ca3af;
  font-size:12px;
  cursor:pointer;
}

.nav-btn.active{
  color:#FFD700;
}

.modal{
  position:absolute;
  inset:0;
  z-index:120;
  background:#111827;
}

.modal-header{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  border-bottom:1px solid #1f2937;
}

.modal-body{
  padding:16px;
  overflow-y:auto;
  height:calc(100% - 60px);
}

#node-toast{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#10b981;
  color:white;
  padding:10px 18px;
  border-radius:999px;
  z-index:999;
  opacity:0;
  transition:.25s;
}

#node-toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div id="starter-screen">
  <h1>⚡ PokéMesh</h1>
  <div id="starter-grid"></div>
</div>

<div id="game-screen" class="hidden">

  <div id="topbar">
    <div class="logo">⚡ PokéMesh</div>
  </div>

  <div id="field-area">

    <div id="field-mons"></div>

    <div id="map-overlay">
      <div id="map"></div>
    </div>

  </div>

  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-field">🌿<br>Field</button>
    <button class="nav-btn" id="nav-map">🗺️<br>Map</button>
    <button class="nav-btn" id="nav-storage">📦<br>Storage</button>
    <button class="nav-btn" id="nav-dex">📖<br>Dex</button>
  </div>

  <div id="storage-modal" class="modal hidden">
    <div class="modal-header">
      <h2>Storage</h2>
      <button id="close-storage">✕</button>
    </div>
    <div class="modal-body">
      PC Storage
    </div>
  </div>

  <div id="dex-modal" class="modal hidden">
    <div class="modal-header">
      <h2>Pokédex</h2>
      <button id="close-dex">✕</button>
    </div>
    <div class="modal-body">
      Pokédex Entries
    </div>
  </div>

</div>

<div id="node-toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
window.onerror=function(msg,src,line,col,error){
  console.error(error||msg);
  alert("ERROR: "+msg+" @ line "+line);
};

const STARTERS=[
  {id:1,name:'Bulbasaur'},
  {id:4,name:'Charmander'},
  {id:7,name:'Squirtle'},
  {id:25,name:'Pikachu'},
  {id:133,name:'Eevee'},
  {id:122,name:'Mr Mime'}
];

const spriteUrl=id =>
  `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

let map=null;

function showToast(msg){
  const t=document.getElementById('node-toast');

  t.textContent=msg;
  t.classList.add('show');

  setTimeout(()=>{
    t.classList.remove('show');
  },3000);
}

function buildStarterGrid(){

  const grid=document.getElementById('starter-grid');

  grid.innerHTML='';

  STARTERS.forEach(mon=>{

    const card=document.createElement('div');

    card.className='starter-card';

    card.innerHTML=`
      <img src="${spriteUrl(mon.id)}">
      <div>${mon.name}</div>
    `;

    card.addEventListener('click',()=>{
      startGame(mon);
    });

    grid.appendChild(card);
  });
}

function startGame(mon){

  document.getElementById('starter-screen')
    .classList.add('hidden');

  document.getElementById('game-screen')
    .classList.remove('hidden');

  renderField(mon);

  initMap();

  showToast(mon.name + " chosen!");
}

function renderField(mon){

  const field=document.getElementById('field-mons');

  field.innerHTML='';

  const div=document.createElement('div');

  div.className='field-mon';

  div.innerHTML=`
    <img src="${spriteUrl(mon.id)}">
    <div>${mon.name}</div>
  `;

  field.appendChild(div);
}

function initMap(){

  if(map) return;

  map=L.map('map',{
    zoomControl:true
  }).setView([47.6205,-122.3493],13);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {
      maxZoom:19
    }
  ).addTo(map);

  L.marker([47.6205,-122.3493])
    .addTo(map)
    .bindPopup("Space Needle");

  setTimeout(()=>{
    map.invalidateSize();
  },200);
}

function showView(view){

  document.querySelectorAll('.nav-btn')
    .forEach(btn=>btn.classList.remove('active'));

  document.getElementById('storage-modal')
    .classList.add('hidden');

  document.getElementById('dex-modal')
    .classList.add('hidden');

  if(view==='field'){

    document.getElementById('nav-field')
      .classList.add('active');
  }

  if(view==='map'){

    document.getElementById('nav-map')
      .classList.add('active');

    setTimeout(()=>{
      if(map){
        map.invalidateSize();
      }
    },200);
  }

  if(view==='storage'){

    document.getElementById('nav-storage')
      .classList.add('active');

    document.getElementById('storage-modal')
      .classList.remove('hidden');
  }

  if(view==='dex'){

    document.getElementById('nav-dex')
      .classList.add('active');

    document.getElementById('dex-modal')
      .classList.remove('hidden');
  }
}

window.addEventListener('load',()=>{

  buildStarterGrid();

  document.getElementById('nav-field')
    .addEventListener('click',()=>showView('field'));

  document.getElementById('nav-map')
    .addEventListener('click',()=>showView('map'));

  document.getElementById('nav-storage')
    .addEventListener('click',()=>showView('storage'));

  document.getElementById('nav-dex')
    .addEventListener('click',()=>showView('dex'));

  document.getElementById('close-storage')
    .addEventListener('click',()=>showView('field'));

  document.getElementById('close-dex')
    .addEventListener('click',()=>showView('field'));

  showToast("Game loaded!");
});
</script>

</body>
</html>
