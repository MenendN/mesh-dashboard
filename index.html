<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>PokéMesh</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#1a1a2e;
  color:#fff;
  height:100vh;
  width:100vw;
  overflow:hidden;
}

/* =======================================================
   ENCOUNTER TIMER
======================================================= */
#encounter-timer{
  position:absolute;
  top:10px;
  left:10px;
  z-index:50;
  background:#000c;
  border:2px solid #FFD70055;
  border-radius:14px;
  padding:8px 12px;
  font-size:13px;
  font-weight:800;
  color:#FFD700;
  backdrop-filter:blur(4px);
  box-shadow:0 0 12px #0008;
}
#encounter-timer.ready{
  color:#1D9E75;
  border-color:#1D9E75;
}

/* =======================================================
   EXISTING STYLES
======================================================= */

.screen{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
.screen.hidden{display:none!important;}

#starter-screen h1{font-size:28px;font-weight:800;color:#FFD700;text-shadow:0 0 20px #FFD70088;margin-bottom:4px;}
#starter-screen p{font-size:13px;color:#aaa;margin-bottom:18px;}
.starter-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:380px;}
.starter-card{background:#ffffff11;border:2px solid #ffffff22;border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s;}
.starter-card:active{border-color:#FFD700;background:#FFD70022;transform:scale(1.04);}
.starter-card img{width:68px;height:68px;image-rendering:pixelated;}
.starter-card .sname{font-size:11px;font-weight:700;margin-top:4px;}
.starter-card .stype{font-size:10px;color:#aaa;}

#game-screen{position:fixed;inset:0;display:flex;flex-direction:column;}
#game-screen.hidden{display:none;}

#top-panel{
  flex:1 1 0;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:#1a1a2e;
  overflow:hidden;
  position:relative;
}

#topbar{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 12px;
  background:#0f1117;
  border-bottom:1px solid #ffffff11;
  flex-shrink:0;
}

#topbar .logo{
  font-size:16px;
  font-weight:800;
  color:#FFD700;
  flex:1;
}

#main-area{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px 12px;
  gap:8px;
  overflow-y:auto;
}

#party-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
}

.party-card{
  background:#0f1117;
  border:2px solid #ffffff15;
  border-radius:12px;
  padding:7px;
  text-align:center;
}

.party-card img{
  width:54px;
  height:54px;
  image-rendering:pixelated;
}

#battle-scene{
  width:100%;
  max-width:380px;
  height:180px;
  background:linear-gradient(#87CEEB 0%,#87CEEB 55%,#8bc34a 55%);
  border-radius:14px;
  position:relative;
  overflow:hidden;
  margin:8px 0;
  border:2px solid #ffffff11;
}

/* BIGGER SPRITES */
#wild-sprite{
  width:100px;
  height:100px;
  image-rendering:pixelated;
  filter:drop-shadow(0 4px 8px #0008);
}

#player-battle-sprite{
  width:84px;
  height:84px;
  image-rendering:pixelated;
  transform:scaleX(-1);
  filter:drop-shadow(0 4px 8px #0008);
}

#encounter{
  position:fixed;
  inset:0;
  z-index:300;
  background:linear-gradient(160deg,#0d1117,#0f3460);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:12px 14px;
  overflow-y:auto;
}

#encounter.hidden{
  display:none;
}

button{
  cursor:pointer;
}

#move-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:7px;
  width:100%;
  max-width:380px;
}

.move-btn{
  padding:9px 6px;
  border-radius:10px;
  border:none;
  font-size:11px;
  font-weight:700;
  color:#fff;
}

#util-btns{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:7px;
  width:100%;
  max-width:380px;
  margin-top:8px;
}

#util-btns button{
  padding:10px 4px;
  border-radius:10px;
  border:none;
  font-size:12px;
  font-weight:700;
}

#btn-catch{background:#FFD700;color:#000;}
#btn-run{background:#2a2d3a;color:#aaa;}
#btn-swap{background:#1a3a8f;color:#fff;}

#battle-log{
  width:100%;
  max-width:380px;
  background:#ffffff08;
  border-radius:10px;
  padding:8px 12px;
  font-size:13px;
  color:#ddd;
  min-height:38px;
  margin-bottom:8px;
  border:1px solid #ffffff15;
}

/* TYPE COLORS */
.t-normal{background:#706748;}
.t-fire{background:#c04000;}
.t-water{background:#1a5fa8;}
.t-grass{background:#2a7a2a;}
.t-electric{background:#a07800;}

/* SIMPLE */
#map{
  position:absolute;
  inset:0;
}

#map-panel{
  flex:0 0 30vh;
  position:relative;
  border-top:2px solid #FFD70033;
}

/* ANIMS */
@keyframes attackSlide{
  0%{transform:scaleX(-1);}
  50%{transform:scaleX(-1) translateX(55px);}
  100%{transform:scaleX(-1);}
}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-8px);}
  75%{transform:translateX(8px);}
}

.anim-attack{
  animation:attackSlide .4s ease;
}

.anim-shake{
  animation:shake .3s ease;
}
</style>
</head>

<body>

<!-- =======================================================
     STARTER
======================================================= -->
<div id="starter-screen" class="screen">
  <h1>⚡ PokéMesh</h1>
  <p>Choose your starter Pokémon</p>

  <div class="starter-grid" id="starter-grid"></div>
</div>

<!-- =======================================================
     GAME
======================================================= -->
<div id="game-screen" class="hidden">

  <!-- ENCOUNTER TIMER -->
  <div id="encounter-timer">
    ⏳ Next Encounter: READY
  </div>

  <div id="top-panel">

    <div id="topbar">
      <span class="logo">⚡ PokéMesh</span>
    </div>

    <div id="main-area">

      <div id="party-grid"></div>

    </div>
  </div>

  <div id="map-panel">
    <div id="map"></div>
  </div>
</div>

<!-- =======================================================
     BATTLE
======================================================= -->
<div id="encounter" class="hidden">

  <h2 id="enc-name"></h2>

  <div id="battle-scene">

    <div style="position:absolute;top:12px;right:18px;">
      <img id="wild-sprite"/>
    </div>

    <div style="position:absolute;bottom:10px;left:18px;">
      <img id="player-battle-sprite"/>
    </div>

  </div>

  <div id="battle-log">A wild Pokémon appeared!</div>

  <div id="move-btns"></div>

  <div id="util-btns">
    <button id="btn-catch">🎯 Catch</button>
    <button id="btn-swap">🔄 Swap</button>
    <button id="btn-run">🏃 Run</button>
  </div>

</div>

<script>

/* =======================================================
   CONFIG
======================================================= */

/* 25 SECOND TIMER */
const BATTLE_COOLDOWN_MS = 25000;

const STARTERS = [
  {id:1,name:'Bulbasaur'},
  {id:4,name:'Charmander'},
  {id:7,name:'Squirtle'},
  {id:25,name:'Pikachu'},
  {id:133,name:'Eevee'},
];

const COMMON = [16,19,21,23,27,41,52,54,56,58,60];

/* =======================================================
   STATE
======================================================= */

let playerParty = [];
let activeSlot = 0;

let inBattle = false;
let lastBattleTime = 0;

let wildMon = null;

/* =======================================================
   SPRITES
======================================================= */

const spriteUrl=id=>
`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

const backUrl=id=>
`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/back/${id}.png`;

/* =======================================================
   STARTERS
======================================================= */

function buildStarterGrid(){

  const grid = document.getElementById('starter-grid');

  STARTERS.forEach(mon=>{

    const card=document.createElement('div');
    card.className='starter-card';

    card.innerHTML=`
      <img src="${spriteUrl(mon.id)}"/>
      <div class="sname">${mon.name}</div>
    `;

    card.onclick=()=>{

      playerParty.push({
        id:mon.id,
        name:mon.name,
        sprite:spriteUrl(mon.id),
        back:backUrl(mon.id),
        hp:50,
        maxHP:50,
        level:5,
      });

      document.getElementById('starter-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');

      renderParty();

      initMap();

      startEncounterTimer();
    };

    grid.appendChild(card);
  });
}

/* =======================================================
   PARTY
======================================================= */

function renderParty(){

  const grid=document.getElementById('party-grid');

  grid.innerHTML='';

  playerParty.forEach((mon,i)=>{

    const card=document.createElement('div');
    card.className='party-card';

    card.innerHTML=`
      <img src="${mon.sprite}"/>
      <div>${mon.name}</div>
      <div>Lv ${mon.level}</div>
    `;

    card.onclick=()=>{

      activeSlot=i;
    };

    grid.appendChild(card);
  });
}

/* =======================================================
   MAP
======================================================= */

let map;

function initMap(){

  map=L.map('map',{
    zoomControl:false,
    attributionControl:false
  }).setView([47.6062,-122.3321],14);

  L.tileLayer(
    'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    {maxZoom:19}
  ).addTo(map);
}

/* =======================================================
   TIMER SYSTEM
======================================================= */

function startEncounterTimer(){

  updateEncounterTimer();

  setInterval(()=>{

    updateEncounterTimer();

  },1000);
}

function updateEncounterTimer(){

  const timer=document.getElementById('encounter-timer');

  if(inBattle){

    timer.innerHTML='⚔️ In Battle';
    timer.classList.remove('ready');
    return;
  }

  const elapsed=Date.now()-lastBattleTime;

  const remain=Math.ceil(
    (BATTLE_COOLDOWN_MS-elapsed)/1000
  );

  if(remain<=0){

    timer.innerHTML='✅ Encounter Ready';
    timer.classList.add('ready');

    if(Math.random()<0.12){

      maybeSpawnEncounter();
    }

  }else{

    timer.innerHTML=`⏳ Next Encounter: ${remain}s`;
    timer.classList.remove('ready');
  }
}

/* =======================================================
   ENCOUNTERS
======================================================= */

async function maybeSpawnEncounter(){

  if(inBattle)return;

  const now=Date.now();

  if(now-lastBattleTime < BATTLE_COOLDOWN_MS){

    return;
  }

  startEncounter();
}

async function startEncounter(){

  inBattle=true;

  const id=COMMON[
    Math.floor(Math.random()*COMMON.length)
  ];

  let data;

  try{

    data=await fetch(
      `https://pokeapi.co/api/v2/pokemon/${id}`
    ).then(r=>r.json());

  }catch{

    data={
      id:id,
      name:'Pokémon'
    };
  }

  wildMon={
    id:id,
    name:data.name,
    sprite:spriteUrl(id),
  };

  document.getElementById('enc-name').textContent=
    'Wild '+wildMon.name;

  /* FIXED SPRITE ISSUE */
  const wildSprite=document.getElementById('wild-sprite');
  const playerSprite=document.getElementById('player-battle-sprite');

  wildSprite.src='';
  playerSprite.src='';

  setTimeout(()=>{

    wildSprite.src=wildMon.sprite;

    playerSprite.src=
      playerParty[activeSlot].back;

  },50);

  renderMoves();

  document.getElementById('encounter')
    .classList.remove('hidden');
}

/* =======================================================
   MOVES
======================================================= */

function renderMoves(){

  const wrap=document.getElementById('move-btns');

  wrap.innerHTML='';

  const moves=[
    {name:'Tackle',type:'normal'},
    {name:'Ember',type:'fire'},
    {name:'Water Gun',type:'water'},
    {name:'Vine Whip',type:'grass'}
  ];

  moves.forEach(move=>{

    const btn=document.createElement('button');

    btn.className=`move-btn t-${move.type}`;

    btn.textContent=move.name;

    btn.onclick=()=>attack(move);

    wrap.appendChild(btn);
  });
}

/* =======================================================
   ATTACK
======================================================= */

async function attack(move){

  const playerSprite=
    document.getElementById('player-battle-sprite');

  const wildSprite=
    document.getElementById('wild-sprite');

  playerSprite.classList.add('anim-attack');

  await sleep(400);

  playerSprite.classList.remove('anim-attack');

  wildSprite.classList.add('anim-shake');

  document.getElementById('battle-log')
    .textContent=
      `${playerParty[activeSlot].name} used ${move.name}!`;

  await sleep(500);

  wildSprite.classList.remove('anim-shake');

  /* quick finish */
  if(Math.random()<0.45){

    endBattle('win');
  }
}

/* =======================================================
   END BATTLE
======================================================= */

function endBattle(result){

  document.getElementById('encounter')
    .classList.add('hidden');

  inBattle=false;

  /* TIMER STARTS AFTER FIGHT ENDS */
  lastBattleTime=Date.now();

  if(result==='win'){

    document.getElementById('battle-log')
      .textContent='You won!';
  }
}

/* =======================================================
   BUTTONS
======================================================= */

document.getElementById('btn-run').onclick=()=>{

  endBattle('run');
};

document.getElementById('btn-catch').onclick=()=>{

  endBattle('catch');
};

/* CHOOSE WHO TO SWAP TO */
document.getElementById('btn-swap').onclick=()=>{

  let names='';

  playerParty.forEach((m,i)=>{

    names += `${i+1}: ${m.name}\n`;
  });

  const choice=prompt(
    'Choose Pokémon number:\n\n'+names
  );

  const idx=parseInt(choice)-1;

  if(
    !isNaN(idx) &&
    playerParty[idx]
  ){

    activeSlot=idx;

    document.getElementById('player-battle-sprite').src=
      playerParty[activeSlot].back;

    document.getElementById('battle-log')
      .textContent=
        `Go, ${playerParty[idx].name}!`;
  }
};

/* =======================================================
   HELPERS
======================================================= */

function sleep(ms){

  return new Promise(r=>setTimeout(r,ms));
}

/* =======================================================
   BOOT
======================================================= */

buildStarterGrid();

</script>

</body>
</html>
