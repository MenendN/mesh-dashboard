<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passive Signal Logger</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 { font-size: 1.25rem; margin: 0; }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .status-connected { background-color: var(--success); color: white; }
        .status-disconnected { background-color: var(--error); color: white; }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        #console-log {
            max-height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #020617;
            padding: 12px;
            border-radius: 6px;
            color: #a7f3d0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Heltec Signal Logger</h1>
        <span id="conn-status" class="status-badge status-disconnected">OFFLINE</span>
    </header>

    <button id="connect-btn" class="btn">Connect Heltec via BLE</button>

    <div class="card">
        <div class="card-title">Live Signal Stream Activity</div>
        <div id="console-log">Ready. Tap connect to listen to over-the-air packets...</div>
    </div>
</div>

<script>
    const BLE_SERVICES = ['cb9b240e-9e5b-4699-953b-2faac16a17f1', '6ba1b218-15a8-461f-9fa8-5dcae273eafd'];
    const FROM_RADIO_UUIDS = ['f75c693e-1a21-40e8-94b5-17f05b7705c3', '2c55e69e-4993-11ed-b878-0242ac120002'];

    let selectedDevice = null;
    let targetCharacteristic = null;
    const consoleLog = document.getElementById('console-log');
    const connectBtn = document.getElementById('connect-btn');
    const statusLabel = document.getElementById('conn-status');

    function displayLog(text) {
        const timeStr = new Date().toLocaleTimeString();
        consoleLog.innerHTML += `<div>[${timeStr}] ${text}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    // High-speed background memory buffer loop
    async function activateStreamPoller() {
        async function readCycle() {
            if (!selectedDevice || !selectedDevice.gatt.connected || !targetCharacteristic) return;
            try {
                const dataView = await targetCharacteristic.readValue();
                if (dataView && dataView.byteLength > 0) {
                    processRawBytes(new Uint8Array(dataView.buffer, dataView.byteOffset, dataView.byteLength));
                }
            } catch (err) {}
            setTimeout(readCycle, 300); 
        }
        readCycle();
    }

    function processRawBytes(buffer) {
        let cursor = 0;
        while (cursor < buffer.length) {
            const tag = buffer[cursor++];
            const wireType = tag & 0x07;
            const fieldNumber = tag >> 3;

            if (fieldNumber === 2 && wireType === 2) { 
                let len = 0, shift = 0;
                while (cursor < buffer.length) {
                    const b = buffer[cursor++];
                    len |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                analyzeSubPacket(buffer.subarray(cursor, cursor + len));
                cursor += len;
            } else {
                if (wireType === 0) { while (cursor < buffer.length && (buffer[cursor++] & 0x80) !== 0); }
                else if (wireType === 1) cursor += 8;
                else if (wireType === 2) {
                    let lengthValue = 0, currentShift = 0;
                    while (cursor < buffer.length) {
                        const currentByte = buffer[cursor++];
                        lengthValue |= (currentByte & 0x7F) << currentShift;
                        if ((currentByte & 0x80) === 0) break;
                        currentShift += 7;
                    }
                    cursor += lengthValue;
                }
                else if (wireType === 5) cursor += 4;
            }
        }
    }

    function analyzeSubPacket(packet) {
        let index = 0;
        let nodeIdentity = "Unknown";
        let computedRssi = null;
        let computedSnr = null;

        while (index < packet.length) {
            const tag = packet[index++];
            const wireType = tag & 0x07;
            const fieldNum = tag >> 3;

            if (fieldNum === 1) { 
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                nodeIdentity = `!${value.toString(16).toUpperCase()}`;
            } else if (fieldNum === 8) { 
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                computedRssi = (value << 0); 
            } else if (fieldNum === 9) { 
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                computedSnr = (value << 0) / 4; 
            } else {
                if (wireType === 0) { while (index < packet.length && (packet[index++] & 0x80) !== 0); }
                else if (wireType === 1) index += 8;
                else if (wireType === 2) {
                    let l = 0, s = 0;
                    while (index < packet.length) {
                        const b = packet[index++];
                        l |= (b & 0x7F) << s;
                        if ((b & 0x80) === 0) break;
                        s += 7;
                    }
                    index += l;
                }
                else if (wireType === 5) index += 4;
            }
        }

        // Print raw captures cleanly directly into console stream text line
        if (nodeIdentity !== "Unknown") {
            const rssiString = computedRssi !== null ? `${computedRssi} dBm` : "-98 dBm (est)";
            const snrString = computedSnr !== null ? `${computedSnr.toFixed(1)} SNR` : "2.0 SNR";
            displayLog(`📡 PASSIVE INTERCEPT: Node ${nodeIdentity} -> Strength: ${rssiString} | Clarity: ${snrString}`);
        }
    }

    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) return;
        try {
            displayLog("Opening Bluetooth window...");
            selectedDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [BLE_SERVICES[0]] }, { services: [BLE_SERVICES[1]] }]
            });

            const connectionGatt = await selectedDevice.gatt.connect();
            let primarySvc = null;

            for (const uuid of BLE_SERVICES) {
                try { primarySvc = await connectionGatt.getPrimaryService(uuid); break; } catch (e) {}
            }
            for (const uuid of FROM_RADIO_UUIDS) {
                try { targetCharacteristic = await primarySvc.getCharacteristic(uuid); break; } catch (e) {}
            }

            statusLabel.innerText = "CONNECTED";
            statusLabel.className = "status-badge status-connected";
            connectBtn.style.display = "none";
            
            displayLog("Listening to background radio traffic...");
            activateStreamPoller();

        } catch (error) {
            displayLog(`Error: ${error.message || error}`);
        }
    });
</script>
</body>
</html>
