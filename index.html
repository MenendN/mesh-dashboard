<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Data Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0;
        }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: #334155;
        }

        .status-connected { background-color: var(--success); color: white; }
        .status-disconnected { background-color: var(--error); color: white; }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }

        .btn-secondary {
            background-color: #475569;
            color: white;
        }

        .btn:active {
            opacity: 0.9;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #334155;
            color: var(--accent);
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: var(--text-muted);
        }

        .data-value {
            font-weight: 500;
            font-family: monospace;
        }

        .signal-indicator {
            font-weight: bold;
            color: var(--accent);
        }

        #log-container {
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            color: #a7f3d0;
        }

        .node-item {
            background-color: #0f172a;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent);
        }

        .node-info-block {
            display: flex;
            flex-direction: column;
        }

        .node-name {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .node-id-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        #empty-nodes-msg {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.85rem;
            padding: 12px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Heltec V3 Radar</h1>
        <span id="connection-status" class="status-badge status-disconnected">OFFLINE</span>
    </header>

    <button id="connect-btn" class="btn">Connect Heltec V3 via BLE</button>
    <button id="phone-gps-btn" class="btn btn-secondary">Use iPhone GPS Location</button>

    <div class="card">
        <div class="card-title">
            <span>GPS Coordinates</span>
            <span id="gps-source" class="source-tag">No Data</span>
        </div>
        <div class="data-row">
            <span class="data-label">Latitude</span>
            <span id="gps-lat" class="data-value">Waiting...</span>
        </div>
        <div class="data-row">
            <span class="data-label">Longitude</span>
            <span id="gps-lng" class="data-value">Waiting...</span>
        </div>
        <div class="data-row">
            <span class="data-label">Altitude</span>
            <span id="gps-alt" class="data-value">Waiting...</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Nearby Mesh Node Strengths</div>
        <div id="node-list-container">
            <div id="empty-nodes-msg">Waiting for surrounding mesh nodes to transmit telemetry...</div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Console Activity</div>
        <div id="log-container">System ready. Tap connect.</div>
    </div>
</div>

<script>
    const SERVICE_UUIDS = [
        'cb9b240e-9e5b-4699-953b-2faac16a17f1',
        '6ba1b218-15a8-461f-9fa8-5dcae273eafd'
    ];

    const FROM_RADIO_UUIDS = [
        'f75c693e-1a21-40e8-94b5-17f05b7705c3',
        '2c55e69e-4993-11ed-b878-0242ac120002'
    ];

    let bleDevice = null;
    let fromRadioChar = null;
    let isPolling = false;
    let watchId = null;
    
    // Memory store to dynamically map and overwrite seen nodes
    const trackedNodes = {};

    const connectBtn = document.getElementById('connect-btn');
    const phoneGpsBtn = document.getElementById('phone-gps-btn');
    const statusBadge = document.getElementById('connection-status');
    const logBox = document.getElementById('log-container');
    const gpsSource = document.getElementById('gps-source');
    const nodeListContainer = document.getElementById('node-list-container');

    function logger(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div>[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // iPhone GPS Engine Link
    phoneGpsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) return;

        if (watchId !== null) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            phoneGpsBtn.innerText = "Use iPhone GPS Location";
            phoneGpsBtn.style.backgroundColor = "#475569";
            gpsSource.innerText = "No Data";
            return;
        }

        watchId = navigator.geolocation.watchPosition(
            (position) => {
                gpsSource.innerText = "iPhone GPS";
                document.getElementById('gps-lat').innerText = position.coords.latitude.toFixed(6);
                document.getElementById('gps-lng').innerText = position.coords.longitude.toFixed(6);
                document.getElementById('gps-alt').innerText = position.coords.altitude ? `${position.coords.altitude.toFixed(1)}m` : "Unavailable";
            },
            (err) => logger(`GPS Error: ${err.message}`),
            { enableHighAccuracy: true }
        );

        phoneGpsBtn.innerText = "Stop iPhone GPS";
        phoneGpsBtn.style.backgroundColor = "#e11d48";
    });

    // Bluetooth Connect Handling
    connectBtn.addEventListener('click', async () => {
        if (!navigator.bluetooth) return;

        try {
            logger("Scanning for Meshtastic hardware...");
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ services: [SERVICE_UUIDS[0]] }, { services: [SERVICE_UUIDS[1]] }]
            });

            const server = await bleDevice.gatt.connect();

            let primaryService = null;
            for (const uuid of SERVICE_UUIDS) {
                try { primaryService = await server.getPrimaryService(uuid); break; } catch (e) {}
            }

            for (const uuid of FROM_RADIO_UUIDS) {
                try { fromRadioChar = await primaryService.getCharacteristic(uuid); break; } catch (e) {}
            }
            
            statusBadge.innerText = "CONNECTED";
            statusBadge.className = "status-badge status-connected";
            connectBtn.style.display = "none";

            try {
                await fromRadioChar.startNotifications();
                fromRadioChar.addEventListener('characteristicvaluechanged', (e) => processIncomingBytes(e.target.value));
                logger("Monitoring nodes via notifications.");
            } catch (notifyErr) {
                logger("Initiating backup polling engine...");
                startFallbackPolling();
            }

        } catch (err) {
            logger(`Error: ${err.message || err}`);
        }
    });

    function startFallbackPolling() {
        if (isPolling) return;
        isPolling = true;
        async function poll() {
            if (!bleDevice || !bleDevice.gatt.connected || !fromRadioChar) return;
            try {
                const view = await fromRadioChar.readValue();
                if (view && view.byteLength > 0) processIncomingBytes(view);
            } catch (e) {}
            setTimeout(poll, 800);
        }
        poll();
    }

    function processIncomingBytes(view) {
        if (!view || view.byteLength === 0) return;
        const bytes = new Uint8Array(view.buffer, view.byteOffset, view.byteLength);
        parseFromRadioProtobuf(bytes);
    }

    // Unpack Meshtastic Protocol Wire Frames
    function parseFromRadioProtobuf(bytes) {
        let i = 0;
        while (i < bytes.length) {
            const key = bytes[i++];
            const type = key & 0x07;
            const fieldNum = key >> 3;

            if (fieldNum === 2 && type === 2) { 
                const [packetLen, nextIdx] = readVarint(bytes, i);
                i = nextIdx;
                parseMeshPacket(bytes.subarray(i, i + packetLen));
                i += packetLen;
            } else {
                i = skipVarintField(bytes, i, type);
            }
        }
    }

    function parseMeshPacket(packetBytes) {
        let i = 0;
        let senderId = "Unknown";
        let rxRssi = 0;
        let rxSnr = 0;
        let hasSignalMetrics = false;

        while (i < packetBytes.length) {
            const key = packetBytes[i++];
            const type = key & 0x07;
            const fieldNum = key >> 3;

            if (fieldNum === 1) { 
                const [val, nextIdx] = readVarint(packetBytes, i);
                senderId = `!${val.toString(16)}`;
                i = nextIdx;
            } else if (fieldNum === 7 && type === 2) { // Payload Variant Data
                const [len, nextIdx] = readVarint(packetBytes, i);
                i = nextIdx;
                i += len; // Jump payload body processing to prioritize raw telemetry layers
            } else if (fieldNum === 8) { // rx_rssi field logic
                const [val, nextIdx] = readVarint(packetBytes, i);
                // Convert to signed 32-bit int logic
                rxRssi = (val << 0);
                hasSignalMetrics = true;
                i = nextIdx;
            } else if (fieldNum === 9) { // rx_snr field logic
                const [val, nextIdx] = readVarint(packetBytes, i);
                // SNR is encoded as float multiplied value mapping rules
                rxSnr = (val << 0) / 4;
                hasSignalMetrics = true;
                i = nextIdx;
            } else {
                i = skipVarintField(packetBytes, i, type);
            }
        }

        // If packet contained active RF reception metrics, push it onto our dashboard list layout
        if (hasSignalMetrics && senderId !== "Unknown") {
            updateNodeRadarUI(senderId, rxRssi, rxSnr);
        }
    }

    // Dynamic UI Renderer for tracked surrounding notes
    function updateNodeRadarUI(nodeId, rssi, snr) {
        const timestamp = new Date().toLocaleTimeString();
        trackedNodes[nodeId] = { rssi, snr, timestamp };

        // Wipe baseline placeholder text
        const emptyMsg = document.getElementById('empty-nodes-msg');
        if (emptyMsg) emptyMsg.remove();

        // Process container update
        let nodeRow = document.getElementById(`node-row-${nodeId}`);
        if (!nodeRow) {
            nodeRow = document.createElement('div');
            nodeRow.id = `node-row-${nodeId}`;
            nodeRow.className = 'node-item';
            nodeListContainer.appendChild(nodeRow);
        }

        // Color coding color tier based on signal strength numbers
        let signalColor = "#22c55e"; // Good Signal
        if (rssi < -95) signalColor = "#eab308"; // Fair Signal
        if (rssi < -110) signalColor = "#ef4444"; // Poor Signal

        nodeRow.innerHTML = `
            <div class="node-info-block">
                <span class="node-name">Node ID: ${nodeId.toUpperCase()}</span>
                <span class="node-id-sub">Last ping heard: ${timestamp}</span>
            </div>
            <div class="signal-indicator" style="color: ${signalColor}">
                ${rssi} dBm <span style="font-size:0.75rem; color:var(--text-muted)">(${snr} SNR)</span>
            </div>
        `;
        
        logger(`Updated packet string info for node: ${nodeId}`);
    }

    function readVarint(bytes, index) {
        let value = 0;
        let shift = 0;
        while (index < bytes.length) {
            const byte = bytes[index++];
            value |= (byte & 0x7F) << shift;
            if ((byte & 0x80) === 0) break;
            shift += 7;
        }
        return [value, index];
    }

    function skipVarintField(bytes, index, type) {
        if (type === 0) { while (index < bytes.length && (bytes[index++] & 0x80) !== 0); }
        else if (type === 1) index += 8;
        else if (type === 2) { const [len, nextIdx] = readVarint(bytes, index); index = nextIdx + len; }
        else if (type === 5) index += 4;
        return index;
    }
</script>
</body>
</html>
