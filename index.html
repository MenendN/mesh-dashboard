<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mesh Data Engine</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #status { color: #fff; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h3>Radar Data Engine</h3>
    <button id="connect-btn" style="padding:15px; cursor:pointer;">CONNECT TO NODE</button>
    <div id="status">Disconnected</div>
    <pre id="data-display">Waiting for data...</pre>

    <script>
        const SERVICE_UUID = '6ba1b218-15a8-461f-9fa8-5dcae273eafd';
        const FROM_RADIO = 'f75c693e-1a21-40e8-94b5-17f05b7705c3';

        let latestNodeData = { rssi: -120 }; // Start low
        let rssiHistory = []; // For smoothing
        let isNearNode = false;

        document.getElementById('connect-btn').onclick = async () => {
            const dev = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
            const server = await dev.gatt.connect();
            const svc = await server.getPrimaryService(SERVICE_UUID);
            const char = await svc.getCharacteristic(FROM_RADIO);
            
            document.getElementById('status').innerText = "Status: Connected & Streaming";
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => parseMeshtasticData(e.target.value));
        };

        function parseMeshtasticData(data) {
            // Simulated RSSI from incoming packet
            let rawRssi = -Math.floor(Math.random() * 60 + 40); 
            
            // SMOOTHING: Keep last 5 readings to prevent flickering
            rssiHistory.push(rawRssi);
            if (rssiHistory.length > 5) rssiHistory.shift();
            let avgRssi = rssiHistory.reduce((a, b) => a + b) / rssiHistory.length;

            latestNodeData.rssi = Math.round(avgRssi);
            
            // PROXIMITY LOGIC
            // Change 'isNearNode' state when RSSI is better than -70
            if (latestNodeData.rssi > -70) {
                if (!isNearNode) {
                    isNearNode = true;
                    console.log("PROXIMITY ALERT: Signal strong!");
                }
            } else {
                isNearNode = false;
            }

            document.getElementById('data-display').innerText = 
                `RSSI (Smoothed): ${latestNodeData.rssi} dBm\nNear Node: ${isNearNode}`;
        }
    </script>
</body>
</html>
