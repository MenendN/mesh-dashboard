<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesh Passive Radar</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }

        h1 { font-size: 1.25rem; margin: 0; }

        .status-badge {
            font-size: 0.85rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 6px;
            background-color: #ef4444;
            color: white;
        }
        .status-connected { background-color: var(--success); }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--accent);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: center;
        }
        .btn-secondary { background-color: #475569; color: white; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #334155;
        }
        .data-row:last-child { border-bottom: none; }
        .data-label { color: var(--text-muted); }
        .data-value { font-weight: 500; font-family: monospace; }

        .signal-bars {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 20px;
        }

        .bar {
            width: 5px;
            background-color: #334155;
            border-radius: 1px;
        }
        .bar1 { height: 6px; }
        .bar2 { height: 11px; }
        .bar3 { height: 16px; }
        .bar4 { height: 21px; }

        #sig-status-text {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #console-log {
            max-height: 140px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            background: #020617;
            padding: 12px;
            border-radius: 6px;
            line-height: 1.6;
        }

        .log-sys { color: #64748b; }
        .log-blue { color: #38bdf8; }
        .log-data { color: #4ade80; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Heltec Passive Radar</h1>
        <span id="conn-status" class="status-badge">OFFLINE</span>
    </header>

    <button id="connect-btn" class="btn">Connect Heltec V3 via BLE</button>
    <button id="phone-gps-btn" class="btn btn-secondary">Use iPhone GPS Location</button>

    <div class="card">
        <div class="card-title">GPS Coordinates</div>
        <div class="data-row"><span class="data-label">Latitude</span><span id="gps-lat" class="data-value">Waiting...</span></div>
        <div class="data-row"><span class="data-label">Longitude</span><span id="gps-lng" class="data-value">Waiting...</span></div>
    </div>

    <div class="card">
        <div class="card-title">Passive Signal Monitor</div>
        <div class="data-row">
            <span class="data-label">Last Node Caught</span>
            <span id="sig-node" class="data-value">None Detected</span>
        </div>
        <div class="data-row">
            <span class="data-label">Signal Level</span>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="sig-status-text" style="color: var(--text-muted);">No Link</span>
                <div class="signal-bars">
                    <div id="b1" class="bar bar1"></div>
                    <div id="b2" class="bar bar2"></div>
                    <div id="b3" class="bar bar3"></div>
                    <div id="b4" class="bar bar4"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-title">Live Activity Log</div>
        <div id="console-log"></div>
    </div>
</div>

<script>
    const BLE_SERVICES = ['cb9b240e-9e5b-4699-953b-2faac16a17f1', '6ba1b218-15a8-461f-9fa8-5dcae273eafd'];
    const FROM_RADIO_UUIDS = ['f75c693e-1a21-40e8-94b5-17f05b7705c3', '2c55e69e-4993-11ed-b878-0242ac120002'];

    let selectedDevice = null;
    let gpsWatchId = null;
    
    const consoleLog = document.getElementById('console-log');
    const connectBtn = document.getElementById('connect-btn');
    const phoneGpsBtn = document.getElementById('phone-gps-btn');
    const statusLabel = document.getElementById('conn-status');

    function displayLog(text, type = 'sys') {
        if (!consoleLog) return;
        const timeStr = new Date().toLocaleTimeString();
        let classType = 'log-sys';
        if (type === 'blue') classType = 'log-blue';
        if (type === 'data') classType = 'log-data';

        consoleLog.innerHTML += `<div class="${classType}">[${timeStr}] ${text}</div>`;
        consoleLog.scrollTop = consoleLog.scrollHeight;
    }

    // Explicit instantaneous execution path layout
    displayLog("Passive background monitoring initialized.", "sys");

    function updateSignalBars(rssi) {
        const b1 = document.getElementById('b1');
        const b2 = document.getElementById('b2');
        const b3 = document.getElementById('b3');
        const b4 = document.getElementById('b4');
        const textStatus = document.getElementById('sig-status-text');

        if (!b1 || !b2 || !b3 || !b4 || !textStatus) return;

        b1.style.backgroundColor = b2.style.backgroundColor = b3.style.backgroundColor = b4.style.backgroundColor = "#334155";

        if (rssi <= -110) {
            textStatus.innerText = "Poor";
            textStatus.style.color = "#f87171";
            b1.style.backgroundColor = "#f87171";
        } else if (rssi > -110 && rssi <= -95) {
            textStatus.innerText = "Fair";
            textStatus.style.color = "#fb923c";
            b1.style.backgroundColor = b2.style.backgroundColor = "#fb923c";
        } else if (rssi > -95 && rssi <= -80) {
            textStatus.innerText = "Good";
            textStatus.style.color = "#facc15";
            b1.style.backgroundColor = b2.style.backgroundColor = b3.style.backgroundColor = "#facc15";
        } else {
            textStatus.innerText = "Excellent";
            textStatus.style.color = "#4ade80";
            b1.style.backgroundColor = b2.style.backgroundColor = b3.style.backgroundColor = b4.style.backgroundColor = "#4ade80";
        }
    }

    function processRawBytes(buffer) {
        let cursor = 0;
        while (cursor < buffer.length) {
            const tag = buffer[cursor++];
            const wireType = tag & 0x07;
            const fieldNumber = tag >> 3;

            if (fieldNumber === 2 && wireType === 2) { 
                let len = 0, shift = 0;
                while (cursor < buffer.length) {
                    const b = buffer[cursor++];
                    len |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                analyzeSubPacket(buffer.subarray(cursor, cursor + len));
                cursor += len;
            } else {
                if (wireType === 0) { while (cursor < buffer.length && (buffer[cursor++] & 0x80) !== 0); }
                else if (wireType === 1) cursor += 8;
                else if (wireType === 2) {
                    let lengthValue = 0, currentShift = 0;
                    while (cursor < buffer.length) {
                        const currentByte = buffer[cursor++];
                        lengthValue |= (currentByte & 0x7F) << currentShift;
                        if ((currentByte & 0x80) === 0) break;
                        currentShift += 7;
                    }
                    cursor += lengthValue;
                }
                else if (wireType === 5) cursor += 4;
            }
        }
    }

    function analyzeSubPacket(packet) {
        let index = 0;
        let nodeIdentity = "Unknown";
        let computedRssi = -102; 

        while (index < packet.length) {
            const tag = packet[index++];
            const wireType = tag & 0x07;
            const fieldNum = tag >> 3;

            if (fieldNum === 1) { 
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                nodeIdentity = `!${value.toString(16).toUpperCase()}`;
            } else if (fieldNum === 8) { 
                let value = 0, shift = 0;
                while (index < packet.length) {
                    const b = packet[index++];
                    value |= (b & 0x7F) << shift;
                    if ((b & 0x80) === 0) break;
                    shift += 7;
                }
                computedRssi = (value << 0); 
            } else {
                if (wireType === 0) { while (index < packet.length && (packet[index++] & 0x80) !== 0); }
                else if (wireType === 1) index += 8;
                else if (wireType === 2) {
                    let l = 0, s = 0;
                    while (index < packet.length) {
                        const b = packet[index++];
                        l |= (b & 0x7F) << s;
                        if ((b & 0x80) === 0) break;
                        s += 7;
                    }
                    index += l;
                }
                else if (wireType === 5) index += 4;
            }
        }

        if (nodeIdentity !== "Unknown") {
            const nodeEl = document.getElementById('sig-node');
            if (nodeEl) nodeEl.innerText = nodeIdentity;
            updateSignalBars(computedRssi);
            displayLog(`📥 Active Intercept: ${nodeIdentity} (RSSI: ${computedRssi} dBm)`, "data");
        }
    }

    if (phoneGpsBtn) {
        phoneGpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) return;
            if (gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
                phoneGpsBtn.innerText = "Use iPhone GPS Location";
                phoneGpsBtn.style.backgroundColor = "#475569";
                return;
            }
            displayLog("Requesting smartphone location hook...", "blue");
            gpsWatchId = navigator.geolocation.watchPosition(
                (position) => {
                    const latEl = document.getElementById('gps-lat');
                    const lngEl = document.getElementById('gps-lng');
                    if (latEl) latEl.innerText = position.coords.latitude.toFixed(6);
                    if (lngEl) lngEl.innerText = position.coords.longitude.toFixed(6);
                },
                (err) => displayLog(`GPS Error: ${err.message}`, "sys"),
                { enableHighAccuracy: true }
            );
            phoneGpsBtn.innerText = "Stop iPhone GPS";
            phoneGpsBtn.style.backgroundColor = "#e11d48";
        });
    }

    if (connectBtn) {
        connectBtn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                displayLog("Web Bluetooth not supported on this device/browser.", "sys");
                return;
            }
            try {
                displayLog("Scanning for local LoRa nodes...", "blue");
                selectedDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [BLE_SERVICES[0]] }, { services: [BLE_SERVICES[1]] }]
                });

                const connectionGatt = await selectedDevice.gatt.connect();
                let primarySvc = null;
                for (const uuid of BLE_SERVICES) {
                    try { primarySvc = await connectionGatt.getPrimaryService(uuid); break; } catch (e) {}
                }

                let fromRadioChar = null;
                for (const uuid of FROM_RADIO_UUIDS) {
                    try { fromRadioChar = await primarySvc.getCharacteristic(uuid); break; } catch (e) {}
                }

                if (statusLabel) {
                    statusLabel.innerText = "CONNECTED";
                    statusLabel.className = "status-badge status-connected";
                }
                connectBtn.style.display = "none";

                displayLog("Passive telemetry listening active...", "blue");
                async function pollEngine() {
                    if (!selectedDevice || !selectedDevice.gatt.connected) return;
                    try {
                        const val = await fromRadioChar.readValue();
                        if (val && val.byteLength > 0) processRawBytes(new Uint8Array(val.buffer));
                    } catch (e) {}
                    setTimeout(pollEngine, 600);
                }
                pollEngine();

            } catch (error) {
                displayLog(`Link Interrupted: ${error.message || error}`, "sys");
            }
        });
    }
</script>
</body>
</html>
